<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitação x Contratação · USC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f4f6fb;
    color: #1a1a2e;
  }

  .header {
    background: linear-gradient(135deg, #0f2460 0%, #1a3a7c 100%);
    color: white;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo { width: 38px; height: 38px; border-radius: 8px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; }
  .header-title { font-size: 16px; font-weight: 700; }
  .header-sub { font-size: 11px; opacity: .75; margin-top: 2px; }
  .btn-voltar {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 16px; border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9);
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .btn-voltar:hover { background: rgba(255,255,255,0.18); }

  .conteudo { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

  .filtros-card {
    background: white; border: 1.5px solid #e3e8f5; border-radius: 14px;
    padding: 22px 24px; margin-bottom: 22px;
  }
  .filtros-grid {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 14px;
    align-items: end;
  }
  .campo label { display: block; font-size: 11.5px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
  .campo input[type="date"] {
    width: 100%; padding: 9px 12px; border: 1.5px solid #d8dfee; border-radius: 8px;
    font-size: 13.5px; color: #1a1a2e; outline: none; height: 40px;
  }
  .campo input:focus { border-color: #1a3a7c; }

  .btn-gerar {
    padding: 11px 22px; border-radius: 9px; border: none;
    background: #1a3a7c; color: white; font-size: 14px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    height: 40px; white-space: nowrap;
  }
  .btn-gerar:hover { background: #0f2460; }
  .btn-gerar:disabled { background: #9ca3af; cursor: not-allowed; }

  .legenda {
    display: flex; gap: 18px; margin-bottom: 14px; font-size: 12.5px; color: #475569;
  }
  .legenda-item { display: flex; align-items: center; gap: 6px; }
  .legenda-dot { width: 11px; height: 11px; border-radius: 3px; }
  .dot-falta { background: #fecaca; border: 1px solid #ef4444; }
  .dot-sobra { background: #bbf7d0; border: 1px solid #16a34a; }
  .dot-neutro { background: #e5e7eb; border: 1px solid #9ca3af; }

  .export-bar { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 14px; }
  .btn-export {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 8px; border: 1.5px solid #d8dfee;
    background: white; color: #475569; font-size: 12.5px; font-weight: 600; cursor: pointer;
  }
  .btn-export:hover { border-color: #1a3a7c; color: #1a3a7c; }

  .resultado-card { background: white; border: 1.5px solid #e3e8f5; border-radius: 14px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: #0f2460; color: white; text-align: left;
    padding: 11px 14px; font-size: 11.5px; text-transform: uppercase; letter-spacing: .4px;
  }
  thead th.num { text-align: right; }
  tbody td { padding: 10px 14px; border-bottom: 1px solid #eef1f8; }
  tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tbody tr.linha-falta { background: #fef2f2; }
  tbody tr.linha-sobra { background: #f0fdf4; }
  tbody tr:hover { filter: brightness(0.97); }
  .badge-falta { display: inline-block; padding: 2px 8px; border-radius: 6px; background: #fecaca; color: #991b1b; font-size: 11px; font-weight: 700; }
  .badge-sobra { display: inline-block; padding: 2px 8px; border-radius: 6px; background: #bbf7d0; color: #14532d; font-size: 11px; font-weight: 700; }
  .badge-neutro { display: inline-block; padding: 2px 8px; border-radius: 6px; background: #e5e7eb; color: #475569; font-size: 11px; font-weight: 700; }

  .loading-state, .erro-state, .vazio-state { text-align: center; padding: 60px 20px; color: #94a0b8; }
  .spinner { width: 30px; height: 30px; border: 3px solid #e3e8f5; border-top-color: #1a3a7c; border-radius: 50%; margin: 0 auto 12px; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .erro-state { color: #ef4444; }

  @media print {
    .header, .filtros-card, .export-bar, .btn-voltar { display: none !important; }

    body { background: white; margin: 0; }
    .conteudo { padding: 0; max-width: 100%; }

    .legenda {
      margin-bottom: 10px; font-size: 10px;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }

    .resultado-card { border: none; border-radius: 0; }
    table { font-size: 10px; }
    thead th {
      padding: 6px 8px; font-size: 9px;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    tbody td { padding: 5px 8px; }
    tbody tr.linha-falta, tbody tr.linha-sobra {
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .badge-falta, .badge-sobra, .badge-neutro {
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
      font-size: 9px; padding: 1px 6px;
    }

    @page {
      margin: 10mm;
      size: landscape;
    }

    #cabecalhoImpressao { display: block !important; margin-bottom: 12px; }
  }

  #cabecalhoImpressao { display: none; }
  #cabecalhoImpressao .titulo-rel { font-size: 14px; font-weight: 800; color: #0f2460; }
  #cabecalhoImpressao .periodo-rel { font-size: 11px; color: #475569; margin-top: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">USC</div>
    <div>
      <div class="header-title">Solicitação x Contratação</div>
      <div class="header-sub">Acompanhamento de vagas em aberto e candidatos disponíveis por cargo</div>
    </div>
  </div>
  <button class="btn-voltar" onclick="window.location.href='hub.html'">
    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Voltar ao Hub
  </button>
</div>

<div class="conteudo">

  <div id="cabecalhoImpressao">
    <div class="titulo-rel">Usina Santa Clotilde S/A — Solicitação x Contratação</div>
    <div class="periodo-rel" id="periodoImpressao"></div>
  </div>

  <div class="filtros-card">
    <div class="filtros-grid">
      <div class="campo">
        <label>Data Início</label>
        <input type="date" id="dataIni">
      </div>
      <div class="campo">
        <label>Data Fim</label>
        <input type="date" id="dataFim">
      </div>
      <div class="campo">
        <button class="btn-gerar" id="btnGerar" onclick="gerarRelatorio()">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Gerar Relatório
        </button>
      </div>
    </div>
  </div>

  <div id="export-area" style="display:none">
    <div class="legenda">
      <div class="legenda-item"><span class="legenda-dot dot-falta"></span> Falta contratar</div>
      <div class="legenda-item"><span class="legenda-dot dot-sobra"></span> Sobra de candidatos</div>
      <div class="legenda-item"><span class="legenda-dot dot-neutro"></span> Equilibrado</div>
    </div>
    <div class="export-bar">
      <button class="btn-export" onclick="exportarExcel()">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Excel
      </button>
      <button class="btn-export" onclick="imprimirComCabecalho()">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        PDF
      </button>
    </div>
  </div>

  <div id="resultado">
    <div class="vazio-state">
      <p>Informe o período para gerar o relatório.</p>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let DADOS_RAW = [];

// Datas padrão: mês atual
(function initDatas() {
  const hoje = new Date();
  const ini = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
  const fim = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0);
  document.getElementById('dataIni').value = fmt8(ini);
  document.getElementById('dataFim').value = fmt8(fim);
})();

function fmt8(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return y + '-' + m + '-' + dd;
}

async function gerarRelatorio() {
  const dataIni = document.getElementById('dataIni').value;
  const dataFim = document.getElementById('dataFim').value;

  if (!dataIni || !dataFim) { alert('Informe o período completo.'); return; }
  if (dataFim < dataIni) { alert('Data Fim não pode ser anterior à Data Início.'); return; }

  const btn = document.getElementById('btnGerar');
  btn.disabled = true;
  btn.textContent = 'Consultando…';
  document.getElementById('export-area').style.display = 'none';
  document.getElementById('resultado').innerHTML =
    '<div class="loading-state"><div class="spinner"></div><p>Consultando Oracle…</p></div>';

  try {
    const url = `api/solicitacao-contratacao?dataIni=${dataIni}&dataFim=${dataFim}`;
    const r = await fetch(url);
    const j = await r.json();
    if (!j.ok) throw new Error(j.erro);

    DADOS_RAW = j.data;
    renderizarTabela();

  } catch(e) {
    document.getElementById('resultado').innerHTML =
      '<div class="erro-state"><p>❌ ' + e.message + '</p></div>';
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> Gerar Relatório`;
  }
}

function renderizarTabela() {
  const el = document.getElementById('resultado');

  if (DADOS_RAW.length === 0) {
    el.innerHTML = '<div class="vazio-state"><p>Nenhum dado encontrado para o período.</p></div>';
    document.getElementById('export-area').style.display = 'none';
    return;
  }

  const linhas = DADOS_RAW.map(d => {
    const diferenca = d.diferenca || 0;
    let classeLinha = '', badge = '';

    if (diferenca > 0) {
      classeLinha = 'linha-falta';
      badge = `<span class="badge-falta">Falta ${fmtNum(diferenca)}</span>`;
    } else if (diferenca < 0) {
      classeLinha = 'linha-sobra';
      badge = `<span class="badge-sobra">Sobra ${fmtNum(Math.abs(diferenca))}</span>`;
    } else {
      badge = `<span class="badge-neutro">Equilibrado</span>`;
    }

    return `
      <tr class="${classeLinha}">
        <td>${escapeHtml(d.descDepartamento || '—')}</td>
        <td>${escapeHtml(d.descCargo || '—')}</td>
        <td class="num">${fmtNum(d.qtdeSolicitada)}</td>
        <td class="num">${fmtNum(d.qtdeCandidato)}</td>
        <td class="num">${fmtNum(d.qtdeContratada)}</td>
        <td>${badge}</td>
      </tr>
    `;
  }).join('');

  el.innerHTML = `
    <div class="resultado-card">
      <table>
        <thead>
          <tr>
            <th>Departamento</th><th>Cargo</th>
            <th class="num">Qtd. Solicitada</th><th class="num">Qtd. Candidatos</th>
            <th class="num">Qtd. Contratada</th><th>Situação</th>
          </tr>
        </thead>
        <tbody>${linhas}</tbody>
      </table>
    </div>
  `;

  document.getElementById('export-area').style.display = 'block';
}

function exportarExcel() {
  if (!DADOS_RAW || DADOS_RAW.length === 0) { alert('Gere o relatório antes de exportar.'); return; }

  const cabecalho = ['Departamento', 'Cargo', 'Qtd. Solicitada', 'Qtd. Candidatos', 'Qtd. Contratada'];
  const linhas = DADOS_RAW.map(d => [
    d.descDepartamento || '',
    d.descCargo || '',
    d.qtdeSolicitada != null ? Number(d.qtdeSolicitada) : '',
    d.qtdeCandidato != null ? Number(d.qtdeCandidato) : '',
    d.qtdeContratada != null ? Number(d.qtdeContratada) : ''
  ]);

  const wsData = [cabecalho, ...linhas];
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  ws['!cols'] = [
    { wch: 26 }, { wch: 30 }, { wch: 14 }, { wch: 14 }, { wch: 14 }
  ];

  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let row = 1; row <= range.e.r; row++) {
    for (let col = 2; col <= 4; col++) {
      const ref = XLSX.utils.encode_cell({ r: row, c: col });
      if (ws[ref] && typeof ws[ref].v === 'number') ws[ref].z = '0';
    }
  }

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Solicitação x Contratação');
  XLSX.writeFile(wb, 'solicitacao_contratacao_USC.xlsx');
}

function fmtNum(v) {
  if (v == null) return '0';
  return Number(v).toLocaleString('pt-BR', { maximumFractionDigits: 0 });
}
function formatarData(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-');
  return d + '/' + m + '/' + y;
}

function imprimirComCabecalho() {
  const dataIni = document.getElementById('dataIni').value;
  const dataFim = document.getElementById('dataFim').value;
  document.getElementById('periodoImpressao').textContent =
    'Período: ' + formatarData(dataIni) + ' a ' + formatarData(dataFim);
  window.print();
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>

<script src="js/agro-chat-widget.js" defer></script>
</body>
</html>
