<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Alfredo — USC</title>
<style>
  :root {
    --verde: #1a3a7c;
    --verde-escuro: #0f2460;
    --verde-claro: #e8eef8;
    --creme: #F5F0E8;
    --cinza: #6b7280;
    --cinza-claro: #f3f4f6;
    --border: #d1d5db;
    --text: #1f2937;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--creme); color: var(--text); font-size: 13px; height: 100vh; display: flex; flex-direction: column; }

  .header {
    background: var(--verde-escuro); color: white;
    padding: 16px 24px; display: flex; align-items: center; gap: 14px; flex-shrink: 0;
  }
  .logo-box {
    width: 44px; height: 44px; background: white; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--verde-escuro); flex-shrink: 0;
  }
  .header-title { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
  .header-sub   { font-size: 12px; opacity: .85; margin-top: 2px; }

  .nav-tabs { display: flex; gap: 8px; }
  .nav-tab {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 18px; border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.75);
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all .18s;
  }
  .nav-tab:hover { background: rgba(255,255,255,0.2); color: white; border-color: rgba(255,255,255,0.5); }

  .chat-wrap {
    flex: 1; max-width: 860px; width: 100%; margin: 0 auto;
    display: flex; flex-direction: column; min-height: 0; padding: 20px 24px;
  }

  .chat-mensagens {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 14px;
    padding: 8px 4px 16px;
  }

  .msg { display: flex; gap: 10px; max-width: 85%; }
  .msg.usuario { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: white;
  }
  .msg.bot .msg-avatar { background: var(--verde-escuro); }
  .msg.usuario .msg-avatar { background: #16a34a; }
  .msg-bolha {
    background: white; border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 14px; font-size: 13.5px; line-height: 1.5; white-space: pre-wrap;
  }
  .msg.usuario .msg-bolha { background: var(--verde-escuro); color: white; border-color: var(--verde-escuro); }
  .msg.erro .msg-bolha { background: #fef2f2; border-color: #fca5a5; color: #b91c1c; }

  .msg-loading .msg-bolha { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--cinza); animation: pulse 1.2s infinite ease-in-out; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%, 80%, 100% { opacity: .3; } 40% { opacity: 1; } }

  .chat-vazio { text-align: center; color: var(--cinza); padding: 60px 24px; margin: auto; }
  .chat-vazio svg { width: 40px; height: 40px; opacity: .35; margin-bottom: 10px; }
  .chat-vazio p { font-size: 13.5px; }
  .chat-vazio .exemplos { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .exemplo-btn {
    background: white; border: 1.5px solid var(--border); border-radius: 8px;
    padding: 8px 14px; font-size: 12.5px; color: var(--verde-escuro); cursor: pointer; transition: all .15s;
  }
  .exemplo-btn:hover { border-color: var(--verde); background: var(--verde-claro); }

  .chat-input-bar {
    display: flex; gap: 10px; padding: 14px 0 4px; flex-shrink: 0;
    border-top: 1px solid var(--border);
  }
  .chat-input-bar textarea {
    flex: 1; resize: none; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px 14px; font-size: 13.5px; font-family: inherit; background: white;
    max-height: 120px; min-height: 42px; line-height: 1.4;
  }
  .chat-input-bar textarea:focus { outline: none; border-color: var(--verde); }
  .btn-enviar {
    background: var(--verde); color: white; border: none; border-radius: 10px;
    padding: 0 20px; font-weight: 700; font-size: 13px; cursor: pointer; transition: background .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-enviar:hover:not(:disabled) { background: var(--verde-escuro); }
  .btn-enviar:disabled { background: #9ca3af; cursor: not-allowed; }

  /* Voz: microfone (perguntar falando) e alto-falante (ler respostas) */
  .btn-mic, .btn-voz {
    background: white; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 0 13px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--cinza); transition: all .15s; flex-shrink: 0;
  }
  .btn-mic:hover, .btn-voz:hover { border-color: var(--verde); color: var(--verde); }
  .btn-mic.gravando { background: #dc2626; border-color: #dc2626; color: white; animation: pulseMic 1.1s infinite; }
  .btn-voz.ativo { background: var(--verde); border-color: var(--verde); color: white; }
  @keyframes pulseMic { 0%, 100% { opacity: 1; } 50% { opacity: .55; } }

  /* Telefone: logo + título numa linha, botões em linha própria ocupando a largura */
  @media (max-width: 640px) {
    .header { flex-wrap: wrap; padding: 10px 12px; gap: 10px; }
    .logo-box { width: 36px; height: 36px; font-size: 13px; }
    .header-title { font-size: 15px; }
    .header-sub { display: none; }
    .nav-tabs { width: 100%; gap: 6px; }
    .nav-tab { flex: 1; justify-content: center; padding: 8px 6px; font-size: 12px; white-space: nowrap; }
    .chat-wrap { padding: 12px; }
    .msg { max-width: 95%; }
    .btn-mic, .btn-voz { padding: 0 11px; }
    .btn-enviar { padding: 0 14px; }
  }

  /* PDF = impressão da conversa (window.print) */
  .print-header { display: none; }

  @page { size: A4 portrait; margin: 12mm; }
  @media print {
    body { height: auto; display: block; background: white; }
    .header, .chat-input-bar, .chat-vazio { display: none !important; }
    .print-header {
      display: block; margin-bottom: 18px; padding-bottom: 10px;
      border-bottom: 2px solid var(--verde-escuro);
    }
    .print-header h1 { font-size: 16px; color: var(--verde-escuro); }
    .print-header p { font-size: 11px; color: var(--cinza); margin-top: 3px; }
    .chat-wrap { max-width: 100%; padding: 0; display: block; }
    .chat-mensagens { overflow: visible; display: block; }
    .msg { max-width: 100%; margin-bottom: 12px; page-break-inside: avoid; }
    .msg.usuario { flex-direction: row; }
    .msg.usuario .msg-bolha { background: var(--verde-claro); color: var(--text); border-color: var(--border); }
    .msg-avatar { border: 1px solid var(--border); }
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let SESSION_ID = sessionStorage.getItem('agroChatSessionId');
if (!SESSION_ID) {
  SESSION_ID = 'web-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
  sessionStorage.setItem('agroChatSessionId', SESSION_ID);
}

fetch('api/sessao').then(r => r.json()).then(j => {
  if (!j || !j.logon) { window.location.href = 'login.html'; return; }
  // Nível 1 de permissão: acesso ao assistente (admin sempre tem)
  return fetch('api/ia/agro-chat-acesso').then(r => r.json()).then(a => {
    if (a && a.ok && !a.acesso) {
      alert('Você ainda não tem acesso ao Dr. Alfredo. Solicite a liberação ao administrador da intranet.');
      window.location.href = 'hub.html';
    }
  });
}).catch(() => { window.location.href = 'login.html'; });

const chatMensagens = document.getElementById('chatMensagens');
const chatInput     = document.getElementById('chatInput');
const btnEnviar     = document.getElementById('btnEnviar');

function aoTeclar(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    enviarPergunta();
  }
}

chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
});

function enviarExemplo(btn) {
  chatInput.value = btn.textContent;
  enviarPergunta();
}

function removerVazio() {
  const vazio = document.getElementById('chatVazio');
  if (vazio) vazio.remove();
}

function addMensagem(tipo, texto) {
  removerVazio();
  const div = document.createElement('div');
  div.className = 'msg ' + tipo;
  const avatar = tipo === 'usuario' ? 'Eu' : 'Dr';
  div.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-bolha"></div>`;
  div.querySelector('.msg-bolha').textContent = texto;
  chatMensagens.appendChild(div);
  chatMensagens.scrollTop = chatMensagens.scrollHeight;
  return div;
}

// ─── Export das consultas ao banco ───────────────────────────────────────
// A exportação usa os DADOS BRUTOS das consultas feitas pelo agente no
// Oracle (guardados no servidor por sessão) — não o texto da conversa.
// Uma pergunta pode gerar mais de uma consulta (ex.: comparativo entre duas
// safras): cada consulta vira uma aba no Excel / uma tabela no PDF.

async function buscarConsultas(desde) {
  try {
    let url = 'api/ia/agro-ultima-consulta?sessionId=' + encodeURIComponent(SESSION_ID);
    if (desde) url += '&desde=' + desde;
    const r = await fetch(url);
    const j = await r.json();
    if (!j || !j.ok || !Array.isArray(j.consultas)) return [];
    return j.consultas.filter(c => c.data && c.data.length > 0);
  } catch (e) {
    return [];
  }
}

function detectarExport(pergunta) {
  const p = pergunta.toLowerCase();
  const querExcel = /\b(excel|planilha|xlsx)\b/.test(p);
  const querPdf   = /\bpdf\b/.test(p);
  const generico  = /\b(exportar?|exporte|baixar|baixe|download)\b/.test(p);
  return { excel: querExcel || (generico && !querPdf), pdf: querPdf };
}

function nomeAba(titulo, indice, usados) {
  let nome = (titulo || 'Consulta ' + (indice + 1))
    .replace(/[\\\/\?\*\[\]:]/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 28);
  let unico = nome, n = 2;
  while (usados.has(unico)) unico = nome.slice(0, 25) + ' (' + (n++) + ')';
  usados.add(unico);
  return unico;
}

function exportarExcelDados(consultas) {
  const wb = XLSX.utils.book_new();
  const usados = new Set();

  consultas.forEach((consulta, i) => {
    const dados = consulta.data;
    const colunas = Object.keys(dados[0]);

    const ws = XLSX.utils.json_to_sheet(dados, { header: colunas });

    // Largura das colunas conforme o conteúdo (limitada a 40 caracteres)
    ws['!cols'] = colunas.map(c => {
      let w = c.length;
      for (const linha of dados) {
        const v = linha[c];
        if (v != null) w = Math.max(w, String(v).length);
      }
      return { wch: Math.min(w + 2, 40) };
    });

    XLSX.utils.book_append_sheet(wb, ws, nomeAba(consulta.titulo, i, usados));
  });

  XLSX.writeFile(wb, 'consulta_agricola_USC.xlsx');
}

async function exportarExcel() {
  const consultas = await buscarConsultas(0);
  if (consultas.length === 0) {
    alert('Nenhuma consulta ao banco encontrada nesta conversa. Faça uma pergunta ao assistente primeiro (ex.: talhões da safra).');
    return;
  }
  exportarExcelDados(consultas);
}

// PDF = a conversa como está na tela (impressão do navegador)
function exportarPDF() {
  if (!document.querySelector('.msg')) {
    alert('Envie uma pergunta antes de exportar o PDF da conversa.');
    return;
  }
  const agora = new Date();
  document.getElementById('printData').textContent =
    'Conversa exportada em ' + agora.toLocaleDateString('pt-BR') + ' às ' +
    agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  window.print();
}

async function processarPedidoExport(pergunta, marco) {
  const intent = detectarExport(pergunta);
  if (!intent.excel && !intent.pdf) return;

  if (intent.excel) {
    // Preferir as consultas geradas por ESTA pergunta; se o agente respondeu
    // sem consultar de novo (ex.: "agora gere o excel disso"), usar as últimas.
    let consultas = await buscarConsultas(marco);
    if (consultas.length === 0) consultas = await buscarConsultas(0);

    if (consultas.length === 0) {
      addMensagem('bot', 'Você pediu uma planilha, mas ainda não há nenhuma consulta ao banco nesta conversa para exportar. Pergunte algo sobre os talhões primeiro.');
    } else {
      exportarExcelDados(consultas);
      const titulos = consultas.map(c => c.titulo || 'Consulta Agrícola').join('; ');
      const totalLinhas = consultas.reduce((soma, c) => soma + c.data.length, 0);
      addMensagem('bot', '📎 Excel gerado com os dados de: ' + titulos
        + ' (' + totalLinhas + ' registros no total). Verifique os downloads do navegador.');
    }
  }

  if (intent.pdf) {
    addMensagem('bot', '📄 Abrindo a impressão da conversa — escolha "Salvar como PDF" na janela de impressão.');
    exportarPDF();
  }
}

// ─── Voz: perguntar falando (Whisper via servidor) e ouvir respostas ──────
let mediaRecorder = null, chunksGravacao = [], gravando = false;
let lerRespostas = false;

async function toggleGravacao() {
  if (gravando) { mediaRecorder.stop(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
               : (MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '');
    mediaRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
    chunksGravacao = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunksGravacao.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      gravando = false;
      atualizarBotaoMic();
      const blob = new Blob(chunksGravacao, { type: mediaRecorder.mimeType || 'audio/webm' });
      if (blob.size < 1500) return; // clique acidental / gravação vazia
      await transcreverEEnviar(blob);
    };
    mediaRecorder.start();
    gravando = true;
    atualizarBotaoMic();
    setTimeout(() => { if (gravando) mediaRecorder.stop(); }, 60000); // limite 60s
  } catch (e) {
    alert('Não foi possível acessar o microfone: ' + e.message);
  }
}

function atualizarBotaoMic() {
  document.getElementById('btnMic').classList.toggle('gravando', gravando);
  chatInput.placeholder = gravando ? '🔴 Gravando… clique no microfone para parar' : 'Digite sua pergunta…';
}

async function transcreverEEnviar(blob) {
  btnEnviar.disabled = true;
  chatInput.placeholder = 'Transcrevendo áudio…';
  try {
    const r = await fetch('api/ia/transcrever', {
      method: 'POST',
      headers: { 'Content-Type': blob.type || 'audio/webm' },
      body: blob
    });
    const j = await r.json();
    if (!j.ok || !j.texto) {
      alert(j.erro || 'Não consegui entender o áudio. Tente de novo.');
      return;
    }
    chatInput.value = j.texto;
    chatInput.placeholder = 'Digite sua pergunta…';
    await enviarPergunta();
  } catch (e) {
    alert('Falha na transcrição: ' + e.message);
  } finally {
    btnEnviar.disabled = false;
    chatInput.placeholder = 'Digite sua pergunta…';
  }
}

function toggleVoz() {
  lerRespostas = !lerRespostas;
  document.getElementById('btnVoz').classList.toggle('ativo', lerRespostas);
  if (!('speechSynthesis' in window)) {
    if (lerRespostas) alert('Este navegador não suporta leitura em voz alta.');
    return;
  }
  if (!lerRespostas) { speechSynthesis.cancel(); return; }
  // Ao ligar, lê a última resposta que já está na tela — além de ser o que o
  // usuário espera, "destrava" a voz no Safari, que exige que a primeira
  // fala parta de um clique.
  const bolhas = document.querySelectorAll('.msg.bot:not(.msg-loading) .msg-bolha');
  if (bolhas.length > 0) falar(bolhas[bolhas.length - 1].textContent);
}

function falar(texto) {
  if (!lerRespostas || !('speechSynthesis' in window) || !texto) return;
  speechSynthesis.cancel();
  speechSynthesis.resume();
  const u = new SpeechSynthesisUtterance(texto);
  u.lang = 'pt-BR';
  u.rate = 1.05;
  speechSynthesis.speak(u);
}

function addLoading() {
  removerVazio();
  const div = document.createElement('div');
  div.className = 'msg bot msg-loading';
  div.innerHTML = `<div class="msg-avatar">Dr</div><div class="msg-bolha"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  chatMensagens.appendChild(div);
  chatMensagens.scrollTop = chatMensagens.scrollHeight;
  return div;
}

async function enviarPergunta() {
  const pergunta = chatInput.value.trim();
  if (!pergunta) return;

  chatInput.value = '';
  chatInput.style.height = 'auto';
  btnEnviar.disabled = true;

  addMensagem('usuario', pergunta);
  const loadingEl = addLoading();

  // Se a pergunta pede uma planilha, marca o momento atual para depois saber
  // quais consultas ao banco foram geradas por ELA (e não por perguntas antigas).
  const intent = detectarExport(pergunta);
  let marco = 0;
  if (intent.excel) {
    const antes = await buscarConsultas(0);
    marco = antes.reduce((m, c) => Math.max(m, c.timestamp || 0), 0);
  }

  try {
    const resp = await fetch('api/ia/agro-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pergunta, sessionId: SESSION_ID })
    });
    const json = await resp.json();
    loadingEl.remove();

    if (!json.ok) {
      addMensagem('bot erro', json.erro || 'Não foi possível obter resposta do assistente.');
    } else {
      addMensagem('bot', json.resposta || '(resposta vazia)');
      falar(json.resposta);
      await processarPedidoExport(pergunta, marco);
    }
  } catch (e) {
    loadingEl.remove();
    addMensagem('bot erro', 'Falha de comunicação com o assistente: ' + e.message);
  } finally {
    btnEnviar.disabled = false;
    chatInput.focus();
  }
}
</script>

</body>
</html>
