<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo de Caixa — USC</title>
<style>
  :root {
    --verde: #1a3a7c;
    --verde-escuro: #0f2460;
    --verde-claro: #e8eef8;
    --creme: #F5F0E8;
    --cinza: #6b7280;
    --cinza-claro: #f3f4f6;
    --border: #d1d5db;
    --text: #1f2937;
    --white: #ffffff;
    --vermelho: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--creme); color: var(--text); font-size: 13px; }

  /* HEADER */
  .header {
    background: var(--verde-escuro); color: white;
    padding: 16px 24px; display: flex; align-items: center; gap: 14px;
  }
  .logo-box {
    width: 56px; height: 56px; background: white; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; padding: 5px; flex-shrink: 0;
  }
  .logo-box img { width: 46px; height: 46px; object-fit: contain; }
  .header-title { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; }
  .header-sub   { font-size: 12px; opacity: .85; margin-top: 2px; }
  .periodo-print { display: none; }
  .header-clock {
    text-align: right; color: rgba(255,255,255,0.85); font-size: 11px;
    line-height: 1.8; margin-right: 12px;
    border-right: 1px solid rgba(255,255,255,0.2); padding-right: 16px;
  }
  #hdr-hora { font-size: 16px; font-weight: 700; letter-spacing: 1px; font-variant-numeric: tabular-nums; }

  /* NAV TABS */
  .nav-tabs { display: flex; gap: 8px; }
  .nav-tab {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 18px; border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.75);
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all .18s;
  }
  .nav-tab:hover { background: rgba(255,255,255,0.2); color: white; border-color: rgba(255,255,255,0.5); }
  .nav-tab.ativo { background: white; color: var(--verde-escuro); border-color: white; }
  .nav-tab.ativo svg { stroke: var(--verde-escuro); }

  /* MODO BAR */
  .modo-bar { background: #edf1fa; border-bottom: 1px solid var(--border); padding: 10px 24px; }
  .modo-inner { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  #grupo-tiporel { display: flex; align-items: center; gap: 12px; padding-right: 14px; border-right: 1px solid var(--border); }
  .modo-label { font-size: 11px; font-weight: 700; color: var(--cinza); text-transform: uppercase; letter-spacing: .4px; }
  .modo-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 16px; border-radius: 6px; border: 1.5px solid var(--border);
    background: white; color: var(--cinza); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s;
  }
  .modo-btn:hover { border-color: var(--verde); color: var(--verde); }
  .modo-btn.ativo { background: var(--verde); border-color: var(--verde); color: white; }
  .modo-btn.ativo svg { stroke: white; }

  /* FILTROS */
  .filtros { background: white; border-bottom: 1px solid var(--border); padding: 16px 24px; }
  .filtros-grid {
    display: grid;
    grid-template-columns: 148px 148px 108px 1fr 200px;
    gap: 12px; align-items: end;
  }
  .campo label { display: block; font-size: 11px; font-weight: 600; color: var(--cinza); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
  .campo input, .campo select, .campo input[type="number"] {
    width: 100%; padding: 7px 10px; height: 36px; border: 1.5px solid var(--border);
    border-radius: 6px; font-size: 13px; background: var(--cinza-claro); color: var(--text); transition: border-color .2s;
  }
  .campo input:focus, .campo select:focus { outline: none; border-color: var(--verde); background: white; }

  .filtros-row2 { display: flex; gap: 10px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
  .filtros-row2 label { font-size: 11px; font-weight: 600; color: var(--cinza); text-transform: uppercase; letter-spacing: 0.4px; margin-right: 4px; }
  .chip-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 14px; border-radius: 6px; border: 1.5px solid var(--border);
    background: white; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--cinza); transition: all .15s;
  }
  .chip-btn.ativo { background: var(--verde); border-color: var(--verde); color: white; }
  .chip-btn:hover:not(.ativo) { border-color: var(--verde); color: var(--verde); }
  .chip-check { font-size: 11px; font-weight: 900; opacity: 0; }
  .chip-btn.ativo .chip-check { opacity: 1; }

  .btn-gerar {
    padding: 8px 20px; background: var(--verde); color: white;
    border: none; border-radius: 6px; font-weight: 600; cursor: pointer;
    font-size: 13px; white-space: nowrap; transition: background .15s;
  }
  .btn-gerar:hover { background: var(--verde-escuro); }
  .btn-gerar:disabled { background: #9ca3af; cursor: not-allowed; }

  .btn-export {
    flex: 1; padding: 5px 10px; border: 1.5px solid var(--border);
    border-radius: 5px; font-size: 11px; font-weight: 600; cursor: pointer;
    background: white; color: var(--cinza);
    display: flex; align-items: center; gap: 4px; justify-content: center; transition: all .15s;
  }
  .btn-export:hover { border-color: var(--verde); color: var(--verde); }
  .btn-excel:hover  { border-color: #166534; color: #166534; }

  .btn-pdf-modo {
    display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
    padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    background: white; cursor: pointer; text-align: left; transition: all .15s;
  }
  .btn-pdf-modo:hover { border-color: var(--verde); background: var(--verde-claro); }
  .btn-pdf-modo strong { font-size: 13px; color: var(--text); }
  .btn-pdf-modo span { font-size: 11px; color: var(--cinza); }

  .linha-desconsiderada { opacity: .5; text-decoration: line-through; }

  /* RESUMO */
  .resumo {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; padding: 16px 24px 0;
  }
  .card-resumo { background: white; border-radius: 8px; padding: 12px 14px; border: 1px solid var(--border); }
  .card-resumo .label { font-size: 10px; color: var(--cinza); text-transform: uppercase; font-weight: 600; }
  .card-resumo .val   { font-size: 18px; font-weight: 700; color: var(--verde-escuro); margin-top: 3px; }
  .card-resumo .sub   { font-size: 10px; color: var(--cinza); margin-top: 2px; }

  /* TABELA */
  /* Sem overflow-x aqui de propósito: um wrapper com overflow-x:auto força o
     overflow-y computado a virar 'auto' também (regra do CSS Overflow), o
     que faz esse div virar o container de referência do position:sticky —
     e como ele nunca rola de verdade (a altura sempre acompanha o
     conteúdo), o cabeçalho/linha de total congelados param de funcionar ao
     rolar a página. Sem overflow aqui, a página inteira rola normalmente e
     o sticky funciona relativo à viewport; se a tabela ficar mais larga que
     a tela, a página ganha rolagem horizontal (aceitável). */
  .tabela-wrap { padding: 16px 24px 24px; }
  /* Sem overflow:hidden aqui pelo mesmo motivo do .tabela-wrap acima: isso
     também bloquearia o position:sticky do cabeçalho/total. O border-radius
     fica só decorativo na borda externa (com border-collapse:collapse ele
     não recorta o fundo das células dos cantos, mas prioriza o cabeçalho
     congelado funcionar). */
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; border: 1px solid var(--border); min-width: 700px; }
  thead tr  { background: var(--verde-escuro); }
  thead th  { color: white; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; padding: 10px 12px; text-align: right; white-space: nowrap; }
  thead th:first-child { text-align: left; min-width: 220px; position: sticky; left: 0; background: var(--verde-escuro); }
  thead th.semana      { background: var(--verde-escuro); min-width: 110px; }
  thead th.total-col   { background: var(--verde-escuro); }

  /* Cabeçalho + linha "TOTAL DO PERÍODO" congelados no topo ao rolar */
  #resultado > table > thead > tr > th { position: sticky; top: var(--chrome-h, 0px); z-index: 5; }
  #resultado > table > tbody > tr.total-topo > td { position: sticky; top: calc(var(--chrome-h, 0px) + var(--thead-h, 38px)); z-index: 4; }

  /* Header + filtros + resumo, congelados no topo (acima do cabeçalho da tabela) */
  #chrome-fixo { position: sticky; top: 0; z-index: 20; background: var(--creme); }

  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--verde-claro); }
  tbody tr.subtotal    { background: #edf1fa; font-weight: 700; }
  tbody tr.total-geral { background: var(--verde-escuro); color: white; font-weight: 700; }
  tbody tr.total-geral td { color: white; }

  td { padding: 8px 12px; font-size: 12px; text-align: right; white-space: nowrap; }
  td:first-child { text-align: left; position: sticky; left: 0; background: inherit; }
  tbody tr:hover td:first-child       { background: var(--verde-claro); }
  tbody tr.subtotal td:first-child    { background: #edf1fa; }
  tbody tr.total-geral td:first-child { background: var(--verde-escuro); }

  td.item-nome { color: var(--verde-escuro); font-weight: 600; font-size: 12px; }
  td.zero { color: #d1d5db; }

  tbody tr.item-row:hover td:first-child { color: var(--verde); }
  tbody tr.item-row td:first-child::before { content: '▶ '; font-size: 9px; opacity: .5; }
  td.valor-clicavel { cursor: pointer; }
  td.valor-clicavel:hover { background: var(--verde-claro); text-decoration: underline; }

  /* MODAL: valor por fornecedor */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(15,36,96,0.55);
    z-index: 100; align-items: center; justify-content: center; padding: 24px;
  }
  .modal-overlay.aberto { display: flex; }
  .modal-box {
    background: white; border-radius: 12px; max-width: 900px; width: 100%;
    max-height: 82vh; display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; background: var(--verde-escuro); color: white;
    border-radius: 12px 12px 0 0; font-size: 14px; font-weight: 700;
  }
  .modal-fechar {
    background: rgba(255,255,255,0.12); border: none; color: white;
    width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-fechar:hover { background: rgba(255,255,255,0.25); }
  .modal-body { padding: 6px 10px 16px; overflow: auto; }
  .modal-body .detalhe-inner { padding: 10px 10px 4px; }
  .modal-body .detalhe-inner table { min-width: unset; }

  .detalhe-inner { padding: 10px 16px 14px; }
  .detalhe-inner table { border: none; border-radius: 0; background: transparent; min-width: 500px; }
  .detalhe-inner table thead tr { background: #d4dff5; }
  .detalhe-inner table thead th { color: var(--verde-escuro); font-size: 10px; padding: 6px 10px; }
  .detalhe-inner table thead th.semana { color: white; background: var(--verde); }
  .detalhe-inner table thead th:first-child { text-align: left; position: static; background: transparent; }
  .detalhe-inner table tbody td { font-size: 11px; padding: 5px 10px; background: transparent; }
  .detalhe-inner table tbody td:first-child { text-align: left; position: static; background: transparent; }
  .detalhe-inner table tbody tr:hover { background: #e8eef8; }
  .detalhe-inner table tbody tr:hover td:first-child { background: #e8eef8; }

  .modal-totais {
    display: flex; gap: 22px; flex-wrap: wrap; align-items: center; justify-content: flex-end;
    padding: 10px 4px 2px; margin-top: 8px; border-top: 1.5px solid var(--border);
    font-size: 12px; color: var(--cinza);
  }
  .modal-totais strong { color: var(--text); font-variant-numeric: tabular-nums; }
  .modal-totais .destaque { color: var(--verde-escuro); font-weight: 600; }
  .modal-totais .destaque strong { color: var(--verde-escuro); }
  .btn-limpar-desc {
    margin-right: auto; padding: 6px 12px; border-radius: 6px;
    border: 1.5px solid var(--vermelho); background: white; color: var(--vermelho);
    font-size: 11.5px; font-weight: 600; cursor: pointer; transition: all .15s;
  }
  .btn-limpar-desc:hover { background: var(--vermelho); color: white; }

  tr.total-topo td { color: #111827; font-weight: 700; font-size: 12px; padding: 10px 12px; background: #e5e7eb; }

  .empty-state { text-align: center; padding: 60px 24px; color: var(--cinza); }
  .empty-state svg { width: 48px; height: 48px; opacity: .3; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }
  .loading-state { text-align: center; padding: 60px 24px; color: var(--cinza); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--verde); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .erro-state { text-align: center; padding: 40px 24px; color: var(--vermelho); }

  .badge { display: inline-block; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 10px; margin-left: 4px; vertical-align: middle; text-transform: uppercase; }
  .badge-N      { background: #dbeafe; color: #1d4ed8; }
  .badge-S      { background: #e0d4f7; color: #1a3a7c; }
  .badge-Manual { background: #fef3c7; color: #92400e; }

  @media (max-width: 760px) {
    .filtros-grid { grid-template-columns: 1fr 1fr; }
    .filtros-grid > div:last-child { grid-column: 1/-1; }
    .resumo { grid-template-columns: 1fr 1fr; }
  }
  @media print {
    /* Ocultar controles */
    .filtros, .modo-bar, .nav-tabs, .btn-gerar, .btn-export, .resumo,
    .filtros-row2, .btn-sair, .comp-bar, .comp-cards, .modal-overlay { display: none !important; }

    /* position:sticky não faz sentido na impressão/PDF — o navegador acaba
       "flutuando" esses blocos e eles reaparecem no meio de uma página
       paginada, em vez de ficar só no topo do documento. Volta pro fluxo
       normal só na hora de imprimir. */
    #chrome-fixo,
    #resultado > table > thead > tr > th,
    #resultado > table > tbody > tr.total-topo > td {
      position: static !important;
    }
    #chrome-fixo { background: none !important; }

    body { background: white; font-size: 10px; margin: 0; }

    /* Cabeçalho compacto */
    .header {
      padding: 6px 16px !important;
      min-height: unset !important;
    }
    .header-logo {
      width: 32px !important;
      height: 32px !important;
    }
    .header-title {
      font-size: 13px !important;
    }
    .header-sub {
      font-size: 10px !important;
    }
    .header-clock {
      font-size: 10px !important;
    }
    #hdr-hora {
      font-size: 12px !important;
    }
    #hdr-usuario, #hdr-data {
      font-size: 9px !important;
    }
    .periodo-print {
      display: inline !important;
      font-weight: 700;
    }

    /* Tabela compacta */
    table { font-size: 9px; }
    thead th, tbody td { padding: 4px 6px !important; }

    /* Resumo compacto */
    .resumo { gap: 8px !important; padding: 8px 16px !important; }
    .resumo-card { padding: 6px 10px !important; }

    /* Resultado sem padding excessivo */
    .tabela-wrap { padding: 8px 12px !important; }

    /* Garantir impressão colorida nos cabeçalhos */
    thead tr { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    /* Forçar tabela a caber na página */
    #resultado { overflow: visible !important; }
    #resultado table { width: 100% !important; table-layout: fixed; }
    #resultado table th,
    #resultado table td { 
      overflow: hidden; 
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 8px !important;
      padding: 3px 4px !important;
    }
    /* Coluna descrição maior */
    #resultado table th:first-child,
    #resultado table td:first-child { width: 30% !important; white-space: normal; }
    /* Colunas de valor */
    #resultado table th:not(:first-child),
    #resultado table td:not(:first-child) { width: auto !important; text-align: right; }

    @page {
      margin: 8mm;
      size: landscape;
    }
  }

  .btn-sair {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 16px; border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85);
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all .18s; margin-left: 8px;
  }
  .btn-sair:hover { background: rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.6); color: white; }
  .btn-sair svg { width: 15px; height: 15px; }


  /* ── COMPARATIVO ── */
  #painel-comparativo { display: none; }
  .comp-bar { background: #edf1fa; border-bottom: 1px solid var(--border); padding: 14px 24px; }
  .comp-bar-inner { display: flex; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
  .comp-periodos { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .comp-periodo-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .comp-num {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: white; flex-shrink: 0;
  }
  .comp-periodo-row input[type="date"] {
    padding: 7px 10px; border: 1.5px solid var(--border);
    border-radius: 6px; font-size: 13px; background: var(--cinza-claro); color: var(--text);
  }
  .comp-periodo-row input[type="date"]:focus { outline: none; border-color: var(--verde); background: white; }
  .comp-periodo-row input[type="text"] {
    padding: 7px 10px; border: 1.5px solid var(--border);
    border-radius: 6px; font-size: 13px; background: var(--cinza-claro); color: var(--text);
    width: 160px;
  }
  .comp-periodo-row input[type="text"]:focus { outline: none; border-color: var(--verde); background: white; }
  .sep-ate { font-size: 12px; color: var(--cinza); font-weight: 600; }
  .btn-rm-periodo {
    width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--border);
    background: white; cursor: pointer; color: var(--cinza);
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    transition: all .15s; flex-shrink: 0;
  }
  .btn-rm-periodo:hover { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }
  .btn-add-periodo {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 16px; border: 1.5px solid var(--verde);
    border-radius: 6px; background: white; color: var(--verde);
    font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s;
  }
  .btn-add-periodo:hover { background: var(--verde); color: white; }
  .btn-gerar-comp {
    padding: 9px 22px; background: var(--verde); color: white;
    border: none; border-radius: 6px; font-weight: 700; font-size: 13px;
    cursor: pointer; white-space: nowrap; align-self: flex-start;
    transition: background .15s;
  }
  .btn-gerar-comp:hover { background: var(--verde-escuro); }
  .btn-gerar-comp:disabled { background: #9ca3af; cursor: not-allowed; }

  /* Cores das colunas comparativas */
  .col-0 { background: var(--verde-escuro) !important; }
  .col-1 { background: #1a5276 !important; }
  .col-2 { background: #1e8449 !important; }
  .col-3 { background: #784212 !important; }
  .col-4 { background: #512e5f !important; }
  .col-total-comp { background: #1a1a2e !important; }

  .card-comp {
    background: white; border-radius: 10px; padding: 16px 20px;
    border: 2px solid var(--border); flex: 1; min-width: 180px;
  }
  .card-comp .lbl { font-size: 10px; color: var(--cinza); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .card-comp .val { font-size: 22px; font-weight: 800; color: var(--verde-escuro); }
  .card-comp .sub { font-size: 11px; color: var(--cinza); margin-top: 3px; }
  .card-comp.total { border-color: var(--verde-escuro); }
  .card-comp.total .val { font-size: 26px; }

  .comp-cards { display: flex; gap: 14px; flex-wrap: wrap; padding: 16px 24px 0; }

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="USC">
  <meta name="theme-color" content="#0f2460">

<body>

<script>
// ─── Estado global ─────────────────────────────────────────────────────────
let DADOS_RAW    = [];
let PERIODOS     = [];
let GRUPOS       = [];
let filtrosAtivos = new Set(); // vazio = todos
let modoAtual    = 'arealizar';
let tipoRel      = 'simples';
const COR_COLS = ['#0f2460','#1a5276','#1e8449','#784212','#512e5f'];
let compPeriodos = [];

// Parcelas marcadas como "desconsiderar" (chave = documento|parcela|codTipoContasPagar)
// e modo de filtro aplicado só durante a geração do PDF em A Realizar.
let DESCONSIDERADOS = new Set();
let MODO_PDF = null; // null | 'completo' | 'apagar' | 'desconsiderados'
let MODAL_ITENS_ATUAIS = []; // itens exibidos no modal de parcelas aberto (para recalcular o total)

// ─── Init ──────────────────────────────────────────────────────────────────
(function init() {
  const hoje = new Date();
  // padrão: início da semana atual
  const ini = new Date(hoje);
  ini.setDate(ini.getDate() - ini.getDay());
  document.getElementById('dataInicio').value = fmt8(ini);
  ajustarPeriodos();
  verificarSessao();
  atualizarRelogio();
  setInterval(atualizarRelogio, 1000);
  carregarPautaFechada();
  setModo('arealizar');
})();

// ─── Pauta Fechada (parâmetro financeiro) ──────────────────────────────────
async function carregarPautaFechada() {
  try {
    const r = await fetch('api/pauta-fechada');
    const j = await r.json();
    if (!j.ok || !j.dataLimite) return;

    // j.dataLimite vem como YYYY-MM-DD — converter para DD/MM/YYYY
    const [ano, mes, dia] = j.dataLimite.split('-');
    document.getElementById('pautaFechadaData').textContent = dia + '/' + mes + '/' + ano;
    document.getElementById('pautaFechadaInfo').style.display = 'inline';
  } catch(e) {
    // Falha silenciosa — campo informativo, não bloqueia o uso da tela
  }
}

// ─── Relógio ───────────────────────────────────────────────────────────────

function atualizarRelogio() {
  const agora = new Date();
  const dias  = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  document.getElementById('hdr-data').textContent =
    dias[agora.getDay()] + ', ' +
    String(agora.getDate()).padStart(2,'0') + ' ' +
    meses[agora.getMonth()] + '. ' + agora.getFullYear();
  document.getElementById('hdr-hora').textContent =
    String(agora.getHours()).padStart(2,'0') + ':' +
    String(agora.getMinutes()).padStart(2,'0') + ':' +
    String(agora.getSeconds()).padStart(2,'0');
}

// ─── Modo (Realizado / A Realizar) ────────────────────────────────────────
function setModo(modo) {
  modoAtual = modo;
  document.getElementById('tab-realizado').classList.toggle('ativo', modo === 'realizado');
  document.getElementById('tab-arealizar').classList.toggle('ativo', modo === 'arealizar');
  document.getElementById('hdr-tipo-doc').textContent = modo === 'realizado' ? 'Títulos Pagos' : 'Títulos a Pagar';

  // Grupo Simples/Comparativo só aparece no Realizado (a barra em si fica
  // sempre visível por causa dos chips de Tipo de Lançamento)
  document.getElementById('grupo-tiporel').style.display = modo === 'realizado' ? '' : 'none';

  // Resetar para Simples ao trocar de aba
  if (modo === 'arealizar') {
    tipoRel = 'simples';
    document.getElementById('mbtn-simples').classList.add('ativo');
    document.getElementById('mbtn-comparativo').classList.remove('ativo');
    document.getElementById('painel-filtros').style.display = '';
    document.getElementById('painel-comparativo').style.display = 'none';
  }

  limparResultado();
}

// ─── Tipo de relatório ────────────────────────────────────────────────────
function setTipoRel(tipo) {
  tipoRel = tipo;
  document.getElementById('mbtn-simples').classList.toggle('ativo', tipo === 'simples');
  document.getElementById('mbtn-comparativo').classList.toggle('ativo', tipo === 'comparativo');

  // Mostrar/ocultar painéis
  document.getElementById('painel-filtros').style.display    = tipo === 'simples'      ? '' : 'none';
  document.getElementById('painel-comparativo').style.display = tipo === 'comparativo' ? 'block' : 'none';
  document.getElementById('resumo').style.display = 'none';

  if (tipo === 'comparativo') {
    if (compPeriodos.length === 0) initComparativo();
    document.getElementById('compCards').style.display = 'none';
  }

  // Limpar resultado ao trocar modo
  limparResultado();
}

// ─── Periodicidade ────────────────────────────────────────────────────────
function ajustarPeriodos() {
  const p = document.getElementById('periodicidade').value;
  const el  = document.getElementById('numPeriodos');
  const lbl = document.getElementById('labelPeriodos');
  const defaults = { diario:30, semanal:4, mensal:3, semestral:2, anual:1 };
  const labels   = { diario:'Nº de Dias', semanal:'Nº de Semanas', mensal:'Nº de Meses', semestral:'Nº de Semestres', anual:'Nº de Anos' };
  const maxs     = { diario:366, semanal:52, mensal:24, semestral:6, anual:5 };
  el.value = defaults[p]; el.max = maxs[p];
  lbl.textContent = labels[p];
}

// ─── Chips filtro ─────────────────────────────────────────────────────────
function toggleChip(tipo) {
  if (tipo === 'todos') {
    filtrosAtivos.clear();
    document.querySelectorAll('.chip-btn').forEach(b => b.classList.remove('ativo'));
    document.getElementById('chip-todos').classList.add('ativo');
    return;
  }
  document.getElementById('chip-todos').classList.remove('ativo');
  if (filtrosAtivos.has(tipo)) {
    filtrosAtivos.delete(tipo);
    document.getElementById('chip-' + tipo).classList.remove('ativo');
  } else {
    filtrosAtivos.add(tipo);
    document.getElementById('chip-' + tipo).classList.add('ativo');
  }
  if (filtrosAtivos.size === 0)
    document.getElementById('chip-todos').classList.add('ativo');

  // Re-renderizar com filtro aplicado (sem nova chamada ao servidor)
  if (DADOS_RAW.length > 0) renderizar();
}

function getDadosFiltrados() {
  if (filtrosAtivos.size === 0) return DADOS_RAW;
  return DADOS_RAW.filter(d => filtrosAtivos.has(d.pagarReceber === 'P' && !d.provisao ? 'N' : d.provisao));
}

// Decide se um item entra no total (colunas/total do grupo) conforme o modo
// atual — tela normal e PDF "apenas o que vai pagar" excluem desconsiderados;
// PDF "completo" inclui tudo; PDF "desconsiderados" só eles. Fora de A
// Realizar, desconsiderar não existe: tudo entra.
function itemEntraNoTotal(d, desconsiderado) {
  if (modoAtual !== 'arealizar') return true;
  if (MODO_PDF === 'completo') return true;
  if (MODO_PDF === 'desconsiderados') return desconsiderado;
  return !desconsiderado;
}

function chaveParcela(d) {
  return (d.documento || '') + '|' + (d.parcela || '') + '|' + (d.codTipoContasPagar || '');
}

async function carregarDesconsiderados() {
  try {
    const r = await fetch('api/parcela-desconsiderada');
    const j = await r.json();
    DESCONSIDERADOS = new Set((j.data || []).map(x => x.documento + '|' + x.parcela + '|' + x.codTipoContasPagar));
  } catch (e) {
    DESCONSIDERADOS = new Set();
  }
}

async function toggleDesconsiderar(chave, documento, parcela, codTipoContasPagar, marcar, checkboxEl) {
  // Atualização otimista: linha e totais do modal já refletem a marcação
  // antes de esperar o servidor responder — só reverte se der erro.
  if (marcar) DESCONSIDERADOS.add(chave); else DESCONSIDERADOS.delete(chave);
  const tr = checkboxEl.closest('tr');
  if (tr) tr.classList.toggle('linha-desconsiderada', marcar);
  atualizarTotalModal();
  renderizar(); // total por Item/Descrição e TOTAL DO PERÍODO, na hora

  try {
    const r = await fetch('api/parcela-desconsiderada', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ documento, parcela, codTipoContasPagar, desconsiderar: marcar })
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.erro);
  } catch (e) {
    alert('Erro ao salvar: ' + e.message);
    checkboxEl.checked = !marcar;
    if (marcar) DESCONSIDERADOS.delete(chave); else DESCONSIDERADOS.add(chave);
    if (tr) tr.classList.toggle('linha-desconsiderada', !marcar);
    renderizar();
    atualizarTotalModal();
  }
}

// ─── PDF em 3 modos (A Realizar) ───────────────────────────────────────────
function onClickPdf() {
  if (modoAtual === 'arealizar') {
    document.getElementById('modalPdfModo').classList.add('aberto');
  } else {
    imprimirComCabecalho();
  }
}
function fecharModalPdfModo() {
  document.getElementById('modalPdfModo').classList.remove('aberto');
}
function gerarPdfComModo(modo) {
  fecharModalPdfModo();
  MODO_PDF = modo;
  renderizar();
  imprimirComCabecalho();
}
window.addEventListener('afterprint', () => {
  if (MODO_PDF !== null) {
    MODO_PDF = null;
    renderizar();
  }
});

// ─── Gerar relatório ───────────────────────────────────────────────────────
function verificarSessao() {
  fetch("api/sessao").then(r=>r.json()).then(j=>{
    if(!j.ok){ window.location.href="login.html"; return; }
    document.getElementById("hdr-usuario").textContent = j.nome || j.logon;
    if(j.administrador) document.getElementById("btnAdmin").style.display="flex";
  }).catch(()=>{ window.location.href="login.html"; });
}

function fazerLogout() {
  fetch("api/login").finally(()=>{ window.location.href="login.html"; });
}

async function gerarRelatorio() {
  const dataIni    = document.getElementById('dataInicio').value;
  const periodos   = parseInt(document.getElementById('numPeriodos').value) || 4;
  const period     = document.getElementById('periodicidade').value;

  if (!dataIni) { alert('Preencha a Data Início.'); return; }

  // Calcular dataFim a partir de dataIni + nPeriodos
  const ini    = new Date(dataIni + 'T00:00:00');
  const fim    = calcularFim(ini, periodos, period);
  const dataFim = fmt8(fim);

  document.getElementById('btnGerar').disabled = true;
  document.getElementById('resultado').innerHTML =
    '<div class="loading-state"><div class="spinner"></div><p>Consultando Oracle — ' + (modoAtual === 'arealizar' ? 'A Realizar' : 'Realizado') + '…</p></div>';
  document.getElementById('resumo').style.display = 'none';

  try {
    const endpoint = modoAtual === 'arealizar' ? 'api/fluxo-arealizar' : 'api/fluxo-realizado';
    const resp = await fetch('/fluxo-caixa/' + endpoint + '?dataIni=' + dataIni + '&dataFim=' + dataFim);
    const json = await resp.json();
    if (!json.ok) throw new Error(json.erro || 'Erro desconhecido');
    // Normalizar campo valor: A Realizar usa "valor", Realizado usa "realizado"
    DADOS_RAW = json.data.map(d => ({
      ...d,
      realizado: d.realizado != null ? d.realizado : (d.valor != null ? d.valor : 0),
      dataPgto:  modoAtual === 'arealizar' ? d.dataVcto : (d.dataPgto != null ? d.dataPgto : d.dataVcto)
    }));
    if (modoAtual === 'arealizar') await carregarDesconsiderados();
    renderizar();
  } catch (e) {
    document.getElementById('resultado').innerHTML =
      '<div class="erro-state"><p>❌ ' + e.message + '</p></div>';
  } finally {
    document.getElementById('btnGerar').disabled = false;
  }
}

function calcularFim(ini, n, tipo) {
  const d = new Date(ini);
  if (tipo === 'diario')    d.setDate(d.getDate() + n - 1);
  else if (tipo === 'semanal')  d.setDate(d.getDate() + n * 7 - 1);
  else if (tipo === 'mensal')   d.setMonth(d.getMonth() + n), d.setDate(d.getDate() - 1);
  else if (tipo === 'semestral') d.setMonth(d.getMonth() + n * 6), d.setDate(d.getDate() - 1);
  else if (tipo === 'anual')    d.setFullYear(d.getFullYear() + n), d.setDate(d.getDate() - 1);
  return d;
}

// ─── Renderizar ───────────────────────────────────────────────────────────
function renderizar() {
  const agrupar   = document.getElementById('agrupar').value;
  const period    = document.getElementById('periodicidade').value;
  const dataIni   = document.getElementById('dataInicio').value;
  const nPeriodos = parseInt(document.getElementById('numPeriodos').value) || 4;
  const fim       = calcularFim(new Date(dataIni + 'T00:00:00'), nPeriodos, period);

  PERIODOS = gerarPeriodos(dataIni, fmt8(fim), period, nPeriodos);

  const dados = getDadosFiltrados();

  // Agrupar. "itens" sempre guarda TODOS os itens do grupo (mesmo os
  // desconsiderados) — o modal de parcelas precisa deles para listar/
  // desmarcar. "colunas"/"total" só somam o que entra no modo atual
  // (itemEntraNoTotal) — por padrão, sem os desconsiderados.
  const mapa = {};
  dados.forEach(d => {
    const chave = getChave(d, agrupar);
    const label = getLabel(d, agrupar);
    if (!mapa[chave]) mapa[chave] = { chave, label, colunas: {}, total: 0, itens: [], temDesconsiderado: false };

    mapa[chave].itens.push(d);
    const desconsiderado = modoAtual === 'arealizar' && DESCONSIDERADOS.has(chaveParcela(d));
    if (desconsiderado) mapa[chave].temDesconsiderado = true;
    if (!itemEntraNoTotal(d, desconsiderado)) return;

    const dataPgto = d.dataPgto;
    if (!dataPgto) return;
    const col = encontrarPeriodo(dataPgto);
    if (col === null) return;
    mapa[chave].colunas[col] = (mapa[chave].colunas[col] || 0) + (d.realizado || 0);
    mapa[chave].total += (d.realizado || 0);
  });

  // Uma linha some quando o total zera SEM ter desconsiderado (nada a
  // mostrar) — com desconsiderado, a linha fica mesmo com total zerado, para
  // o usuário continuar vendo/desmarcando.
  GRUPOS = Object.values(mapa).filter(g => g.total > 0 || g.temDesconsiderado).sort((a, b) => b.total - a.total);

  // Totais
  const totaisCols = {};
  let totalGeral = 0;
  GRUPOS.forEach(g => {
    Object.entries(g.colunas).forEach(([col, v]) => {
      totaisCols[col] = (totaisCols[col] || 0) + v;
    });
    totalGeral += g.total;
  });

  // Cabeçalho
  const thCols = PERIODOS.map(p => `<th class="semana">${p.label}</th>`).join('');
  const tdTotais = PERIODOS.map(p =>
    `<td><strong>${totaisCols[p.id] ? fmtR(totaisCols[p.id]) : '<span class="zero">—</span>'}</strong></td>`
  ).join('');

  // Linhas — valor em vermelho quando o grupo tem alguma parcela desconsiderada
  const rows = GRUPOS.map((g, idx) => {
    const corValor = g.temDesconsiderado ? `color:var(--vermelho)` : '';
    const tdCols = PERIODOS.map(p => {
      const v = g.colunas[p.id];
      return `<td class="valor-clicavel" style="${corValor}" onclick="abrirModalFornecedores(${idx}, '${p.id}')">${v ? fmtR(v) : '<span class="zero">—</span>'}</td>`;
    }).join('');
    return `
      <tr class="item-row" id="row-${idx}">
        <td class="item-nome valor-clicavel" onclick="abrirModalFornecedores(${idx})">${esc(g.label)}</td>${tdCols}
        <td class="valor-clicavel" style="font-weight:700;${corValor}" onclick="abrirModalFornecedores(${idx})">${fmtR(g.total)}</td>
      </tr>`;
  }).join('');

  document.getElementById('resultado').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Item / Descrição</th>${thCols}
          <th class="total-col">Total</th>
        </tr>
      </thead>
      <tbody>
        <tr class="total-topo">
          <td>▸ TOTAL DO PERÍODO</td>${tdTotais}
          <td>${fmtR(totalGeral)}</td>
        </tr>
        ${rows}
      </tbody>
    </table>`;
  ajustarStickyTotal();
}

// Mede a altura real do cabeçalho da tabela e guarda numa CSS var, para a
// linha "TOTAL DO PERÍODO" (congelada logo abaixo) não ficar sobreposta.
function ajustarStickyTotal() {
  requestAnimationFrame(() => {
    const thead = document.querySelector('#resultado > table > thead');
    if (!thead) return;
    document.documentElement.style.setProperty('--thead-h', thead.getBoundingClientRect().height + 'px');
  });
}

// A altura do bloco fixo (header/filtros/resumo) pode mudar por vários
// motivos que não passam por renderizar() — chips quebrando linha, resize
// da janela, o nome do usuário chegando via /api/sessao, o aviso de
// "Parâmetro" chegando via /api/pauta-fechada — tudo assíncrono. Em vez de
// recalcular manualmente em cada gatilho, observamos o próprio elemento e
// atualizamos --chrome-h sempre que o tamanho dele mudar de verdade.
const chromeFixoEl = document.getElementById('chrome-fixo');
if (chromeFixoEl && 'ResizeObserver' in window) {
  new ResizeObserver(entries => {
    for (const entry of entries) {
      document.documentElement.style.setProperty('--chrome-h', entry.contentRect.height + 'px');
    }
  }).observe(chromeFixoEl);
}

// ─── Detalhe ──────────────────────────────────────────────────────────────
// Ao clicar num valor de período, abre uma caixa (modal) com o valor por
// fornecedor (maior para o menor) daquele período específico. Ao clicar no
// nome do item ou no Total da linha (periodoId omitido), mostra todos os
// períodos somados.
function abrirModalFornecedores(idx, periodoId) {
  const g = GRUPOS[idx];
  const periodoLabel = periodoId ? PERIODOS.find(p => p.id === periodoId)?.label : null;

  // Em A Realizar, mostra as parcelas individuais (documento/parcela), com a
  // coluna Desconsiderar. Em Realizado, mantém o resumo por fornecedor.
  if (modoAtual === 'arealizar') {
    abrirModalParcelas(g, periodoId, periodoLabel);
    return;
  }

  const periodosFiltro = periodoId ? PERIODOS.filter(p => p.id === periodoId) : PERIODOS;
  const thCols = periodosFiltro.map(p => `<th class="semana">${p.label}</th>`).join('');

  // Agrupar itens do grupo por fornecedor (nome), restrito ao período clicado
  // quando informado.
  const porFornecedor = {};
  g.itens.forEach(it => {
    const dataRef = it.dataPgto || it.dataVcto;
    const colPeriodo = dataRef ? encontrarPeriodo(dataRef) : null;
    if (periodoId && colPeriodo !== periodoId) return;

    const chave = it.nome || '—';
    if (!porFornecedor[chave]) porFornecedor[chave] = { nome: chave, colunas: {}, total: 0 };
    if (colPeriodo) {
      porFornecedor[chave].colunas[colPeriodo] = (porFornecedor[chave].colunas[colPeriodo] || 0) + (it.realizado || 0);
    }
    porFornecedor[chave].total += (it.realizado || 0);
  });

  const fornecedoresArr = Object.values(porFornecedor).sort((a, b) => b.total - a.total);

  const linhas = fornecedoresArr.map(f => {
    const tdCols = periodosFiltro.map(p => {
      const valor = f.colunas[p.id] || 0;
      return `<td>${valor ? fmtR(valor) : '<span class="zero">—</span>'}</td>`;
    }).join('');
    return `<tr><td>${esc(f.nome)}</td>${tdCols}</tr>`;
  }).join('');

  document.getElementById('modalFornecedoresTitulo').textContent =
    'Valor por Fornecedor — ' + g.label + (periodoLabel ? ' · ' + periodoLabel : '');
  document.getElementById('modalFornecedoresBody').innerHTML = `
    <div class="detalhe-inner">
      <table>
        <thead><tr>
          <th>Fornecedor</th>${thCols}
        </tr></thead>
        <tbody>${linhas}</tbody>
      </table>
    </div>`;
  document.getElementById('modalFornecedores').classList.add('aberto');
}

// Lista as parcelas individuais (fornecedor, documento, parcela, vencimento,
// valor) do grupo clicado, com checkbox "Desconsiderar" por linha.
function abrirModalParcelas(g, periodoId, periodoLabel) {
  const itensFiltrados = g.itens.filter(it => {
    const dataRef = it.dataPgto || it.dataVcto;
    const colPeriodo = dataRef ? encontrarPeriodo(dataRef) : null;
    return !periodoId || colPeriodo === periodoId;
  }).sort((a, b) =>
    (a.nome || '').localeCompare(b.nome || '', 'pt-BR') ||
    (a.dataVcto || '').localeCompare(b.dataVcto || '')
  );
  MODAL_ITENS_ATUAIS = itensFiltrados;

  const linhas = itensFiltrados.map(it => {
    const chave = chaveParcela(it);
    const marcado = DESCONSIDERADOS.has(chave);
    return `
      <tr class="${marcado ? 'linha-desconsiderada' : ''}">
        <td>${esc(it.nome || '—')}</td>
        <td>${esc(it.documento || '—')}</td>
        <td>${esc(it.parcela || '—')}</td>
        <td>${formatarDataBR(it.dataVcto)}</td>
        <td>${fmtR(it.realizado)}</td>
        <td style="text-align:center">
          <input type="checkbox" class="chk-desconsiderar"
            data-documento="${esc(it.documento || '')}"
            data-parcela="${esc(it.parcela || '')}"
            data-codtipo="${esc(it.codTipoContasPagar || '')}"
            data-chave="${esc(chave)}"
            ${marcado ? 'checked' : ''}>
        </td>
      </tr>`;
  }).join('');

  document.getElementById('modalFornecedoresTitulo').textContent =
    'Parcelas — ' + g.label + (periodoLabel ? ' · ' + periodoLabel : '');
  document.getElementById('modalFornecedoresBody').innerHTML = `
    <div class="detalhe-inner">
      <table>
        <thead><tr>
          <th>Fornecedor</th><th>Documento</th><th>Parcela</th><th>Vencimento</th><th>Valor</th><th>Desconsiderar</th>
        </tr></thead>
        <tbody>${linhas || '<tr><td colspan="6" style="text-align:center;color:var(--cinza)">Nenhuma parcela neste período.</td></tr>'}</tbody>
      </table>
      <div class="modal-totais" id="modalParcelasTotal"></div>
    </div>`;
  document.getElementById('modalFornecedores').classList.add('aberto');
  atualizarTotalModal();

  document.querySelectorAll('#modalFornecedoresBody .chk-desconsiderar').forEach(cb => {
    cb.addEventListener('change', () => {
      const { documento, parcela, codtipo, chave } = cb.dataset;
      toggleDesconsiderar(chave, documento, parcela, codtipo, cb.checked, cb);
    });
  });
}

// Recalcula e mostra o total da pauta / desconsiderado / a pagar do modal
// aberto — chamado ao abrir e imediatamente a cada clique em Desconsiderar,
// sem esperar a resposta do servidor.
function atualizarTotalModal() {
  const el = document.getElementById('modalParcelasTotal');
  if (!el) return;
  let totalPauta = 0, totalPagar = 0, qtdeMarcadas = 0;
  MODAL_ITENS_ATUAIS.forEach(it => {
    const v = it.realizado || 0;
    totalPauta += v;
    if (DESCONSIDERADOS.has(chaveParcela(it))) qtdeMarcadas++;
    else totalPagar += v;
  });
  el.innerHTML = `
    ${qtdeMarcadas > 0 ? `<button class="btn-limpar-desc" onclick="limparMarcacoesModal()">Limpar (${qtdeMarcadas})</button>` : ''}
    <span>Total da Pauta: <strong>${fmtR(totalPauta)}</strong></span>
    <span>Desconsiderado: <strong>${fmtR(totalPauta - totalPagar)}</strong></span>
    <span class="destaque">Total a Pagar: <strong>${fmtR(totalPagar)}</strong></span>`;
}

// Remove a marcação de "desconsiderar" de todas as parcelas exibidas no
// modal aberto (respeitando o período clicado, se houver).
async function limparMarcacoesModal() {
  const marcadas = MODAL_ITENS_ATUAIS.filter(it => DESCONSIDERADOS.has(chaveParcela(it)));
  if (marcadas.length === 0) return;
  if (!confirm('Remover a marcação de ' + marcadas.length + ' parcela(s) desconsiderada(s)?')) return;

  // Otimista: já desmarca tudo na tela antes de esperar o servidor
  marcadas.forEach(it => DESCONSIDERADOS.delete(chaveParcela(it)));
  document.querySelectorAll('#modalFornecedoresBody .chk-desconsiderar').forEach(cb => {
    cb.checked = false;
    cb.closest('tr').classList.remove('linha-desconsiderada');
  });
  atualizarTotalModal();
  renderizar();

  try {
    const respostas = await Promise.all(marcadas.map(it => fetch('api/parcela-desconsiderada', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ documento: it.documento, parcela: it.parcela, codTipoContasPagar: it.codTipoContasPagar, desconsiderar: false })
    }).then(r => r.json())));
    const comErro = respostas.find(j => !j.ok);
    if (comErro) throw new Error(comErro.erro || 'Falha ao limpar algumas marcações');
  } catch (e) {
    alert('Erro ao limpar: ' + e.message + ' — recarregando o estado real.');
    await carregarDesconsiderados();
    atualizarTotalModal();
    renderizar();
    document.querySelectorAll('#modalFornecedoresBody .chk-desconsiderar').forEach(cb => {
      const marcado = DESCONSIDERADOS.has(cb.dataset.chave);
      cb.checked = marcado;
      cb.closest('tr').classList.toggle('linha-desconsiderada', marcado);
    });
  }
}

function fecharModalFornecedores() {
  document.getElementById('modalFornecedores').classList.remove('aberto');
}

document.addEventListener('keydown', e => {

// ─── Períodos ─────────────────────────────────────────────────────────────
function gerarPeriodos(ini, fim, tipo, nPeriodos) {
  // Semanal com 1 única semana: mostrar dia a dia em vez de uma coluna só
  if (tipo === 'semanal' && nPeriodos === 1) tipo = 'diario';

  const periodos = [];
  let cur = new Date(ini + 'T00:00:00');
  const fimDate = new Date(fim + 'T00:00:00');
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  while (cur <= fimDate) {
    let prox, label, id = fmt8(cur);
    if (tipo === 'diario') {
      label = String(cur.getDate()).padStart(2,'0') + '/' + String(cur.getMonth()+1).padStart(2,'0');
      prox = new Date(cur); prox.setDate(prox.getDate() + 1);
    } else if (tipo === 'semanal') {
      const ef = new Date(cur); ef.setDate(ef.getDate() + 6);
      const efReal = ef <= fimDate ? ef : fimDate;
      label = String(cur.getDate()).padStart(2,'0') + '/' + String(cur.getMonth()+1).padStart(2,'0') +
              ' – ' + String(efReal.getDate()).padStart(2,'0') + '/' + String(efReal.getMonth()+1).padStart(2,'0');
      prox = new Date(cur); prox.setDate(prox.getDate() + 7);
    } else if (tipo === 'mensal') {
      label = meses[cur.getMonth()] + '/' + cur.getFullYear();
      prox = new Date(cur); prox.setMonth(prox.getMonth() + 1);
    } else if (tipo === 'semestral') {
      label = (cur.getMonth() < 6 ? '1º Sem' : '2º Sem') + ' ' + cur.getFullYear();
      prox = new Date(cur); prox.setMonth(prox.getMonth() + 6);
    } else {
      label = String(cur.getFullYear());
      prox = new Date(cur); prox.setFullYear(prox.getFullYear() + 1);
    }
    const pFim = new Date(prox.getTime() - 1);
    periodos.push({ id, label, inicio: id, fim: fmt8(pFim) });
    cur = prox;
    if (cur > fimDate) break;
  }
  return periodos;
}

function encontrarPeriodo(dataPgtoStr) {
  for (const p of PERIODOS) {
    if (dataPgtoStr >= p.inicio && dataPgtoStr <= p.fim) return p.id;
  }
  return null;
}

// ─── Agrupamento ──────────────────────────────────────────────────────────
function getChave(d, ag) {
  if (ag === 'descricao')      return d.descricaoConta || d.codContaFluxo || 'sem';
  if (ag === 'empenho_grupo')  return d.descEmpenho || d.codEmpenho || 'sem';
  if (ag === 'empenho')        return (d.codEmpenho || '') + '|' + (d.descEmpenho || '');
  if (ag === 'fornecedor')     return d.codFornecedor || 'sem';
  return d.descricaoConta || d.codContaFluxo || 'sem';
}
function getLabel(d, ag) {
  if (ag === 'descricao')      return d.descricaoConta || String(d.codContaFluxo) || '(sem descrição)';
  if (ag === 'empenho_grupo')  return d.descEmpenho || d.codEmpenho || '(sem empenho)';
  if (ag === 'empenho')        return d.descEmpenho || d.codEmpenho || '(sem empenho)';
  if (ag === 'fornecedor')     return d.nome || '(sem fornecedor)';
  return d.descricaoConta || String(d.codContaFluxo) || '(sem descrição)';
}

// ─── Formatação ───────────────────────────────────────────────────────────
function fmtR(v) {
  if (!v || v === 0) return '<span class="zero">—</span>';
  return v.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtMilhoes(v) {
  const sinal = v < 0 ? '-' : '';
  return sinal + 'R$ ' + (Math.abs(v) / 1e6).toFixed(3);
}
function imprimirComCabecalho() {
  const dataIniStr = document.getElementById('dataInicio').value;
  let textoPeriodo = '';
  if (dataIniStr && PERIODOS.length > 0) {
    const dataFimStr = PERIODOS[PERIODOS.length - 1].fim;
    textoPeriodo = ' · Período: ' + formatarDataBR(dataIniStr) + ' a ' + formatarDataBR(dataFimStr);
  }
  document.getElementById('periodoImpressao').textContent = textoPeriodo;
  window.print();
}

function imprimirComCabecalhoComp() {
  let textoPeriodo = '';
  if (typeof compPeriodos !== 'undefined' && compPeriodos.length > 0) {
    const partes = compPeriodos.map(p => formatarDataBR(p.ini) + ' a ' + formatarDataBR(p.fim));
    textoPeriodo = ' · Períodos: ' + partes.join(' | ');

  window.print();
}

function formatarDataBR(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-');
  return d + '/' + m + '/' + y;
}

function fmt8(d) { const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+dd; }
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Export ───────────────────────────────────────────────────────────────
function exportarExcelComp() {
  // Verificar se há dados do comparativo
  if (!window._compGrupos || window._compGrupos.length === 0) {
    alert('Gere o comparativo antes de exportar.');
    return;
  }

  // Cabeçalho
  const cabPeriodos = compPeriodos.map(p => p.label);
  const cabecalho = ['Item / Descrição', ...cabPeriodos, 'Diferença', 'Var. %'];

  // Totais (linha 1 de dados)
  const totais = compPeriodos.map((_, i) =>
    window._compGrupos.reduce((s, g) => s + (g.totaisPorPeriodo[i] || 0), 0)
  );
  const dif = totais.length >= 2 ? totais[totais.length-1] - totais[0] : 0;
  const perc = totais.length >= 2 && totais[0] !== 0
    ? Number(((dif / Math.abs(totais[0])) * 100).toFixed(1)) : '';

  const linhaTotal = ['TOTAL DO PERÍODO', ...totais.map(v => Number(v.toFixed(2))), Number(dif.toFixed(2)), perc];

  // Grupos
  const linhasGrupos = window._compGrupos.map(g => {
    const difG = g.totaisPorPeriodo.length >= 2
      ? g.totaisPorPeriodo[g.totaisPorPeriodo.length-1] - g.totaisPorPeriodo[0] : 0;
    const percG = g.totaisPorPeriodo.length >= 2 && g.totaisPorPeriodo[0] !== 0
      ? Number(((difG / Math.abs(g.totaisPorPeriodo[0])) * 100).toFixed(1)) : '';
    return [g.label, ...g.totaisPorPeriodo.map(v => Number((v||0).toFixed(2))), Number(difG.toFixed(2)), percG];
  });

  // Montar planilha real (.xlsx) via SheetJS
  const wsData = [cabecalho, linhaTotal, ...linhasGrupos];
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Largura das colunas: 1ª larga (descrição), demais médias
  const numColsPeriodo = compPeriodos.length;
  ws['!cols'] = [
    { wch: 34 },
    ...Array(numColsPeriodo).fill({ wch: 16 }),
    { wch: 16 },  // Diferença
    { wch: 10 },  // Var. %
  ];

  // Formatar colunas numéricas (todas exceto a primeira) com separador de milhar
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let row = 1; row <= range.e.r; row++) {
    for (let col = 1; col <= range.e.c; col++) {
      const cellRef = XLSX.utils.encode_cell({ r: row, c: col });
      if (ws[cellRef] && typeof ws[cellRef].v === 'number') {
        ws[cellRef].z = (col === range.e.c) ? '0.0"%"' : '#,##0.00';
      }
    }
  }

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Comparativo');
  XLSX.writeFile(wb, 'comparativo_USC.xlsx');
}

function initComparativo() {
  const hoje = new Date();
  const ano = hoje.getFullYear();
  const anoAnt = ano - 1;
  // Padrão: 1º semestre do ano atual vs 1º semestre do ano anterior
  const ini1 = ano + '-01-01';
  const fim1 = ano + '-06-30';
  const ini2 = anoAnt + '-01-01';

}

function detectarLabelPeriodo(ini, fim) {
  if (!ini || !fim) return '';
  const iDate = new Date(ini + 'T00:00:00');
  const fDate = new Date(fim + 'T00:00:00');
  const ano  = iDate.getFullYear();
  const iMes = iDate.getMonth(); // 0-based
  const fMes = fDate.getMonth();
  const iDia = iDate.getDate();
  const fDia = fDate.getDate();

  // 1º Semestre: 01/01 a 30/06
  if (iMes === 0 && iDia === 1 && fMes === 5 && fDia === 30) return '1º Semestre ' + ano;
  // 2º Semestre: 01/07 a 31/12
  if (iMes === 6 && iDia === 1 && fMes === 11 && fDia === 31) return '2º Semestre ' + ano;
  // Ano completo: 01/01 a 31/12
  if (iMes === 0 && iDia === 1 && fMes === 11 && fDia === 31) return 'Ano ' + ano;
  // Trimestres
  if (iMes === 0 && iDia === 1 && fMes === 2 && fDia === 31) return '1º Trim. ' + ano;
  if (iMes === 3 && iDia === 1 && fMes === 5 && fDia === 30) return '2º Trim. ' + ano;
  if (iMes === 6 && iDia === 1 && fMes === 8 && fDia === 30) return '3º Trim. ' + ano;
  if (iMes === 9 && iDia === 1 && fMes === 11 && fDia === 31) return '4º Trim. ' + ano;
  // Mês único
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  if (iMes === fMes && ano === fDate.getFullYear()) return meses[iMes] + '/' + ano;
  // Genérico
  const fmt = d => String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
  return fmt(iDate) + ' – ' + fmt(fDate);
}

function sincronizarPeriodo2() {
  if (compPeriodos.length < 2) return;
  const ini = compPeriodos[0].ini;
  const fim = compPeriodos[0].fim;
  if (!ini || !fim) return;
  // Subtrair 1 ano
  const iniAnt = ini.replace(/^(\d{4})/, y => String(parseInt(y) - 1));
  const fimAnt = fim.replace(/^(\d{4})/, y => String(parseInt(y) - 1));
  const label1 = detectarLabelPeriodo(ini, fim);
  const label2 = detectarLabelPeriodo(iniAnt, fimAnt);
  compPeriodos[0].label = label1;
  compPeriodos[1] = { ini: iniAnt, fim: fimAnt, label: label2 };
  renderCompPeriodos();
}

function addPeriodo() {
  if (compPeriodos.length >= 5) { alert('Máximo de 5 períodos'); return; }
  const ano = new Date().getFullYear();
  compPeriodos.push({ ini: fmt8(new Date(ano, 0, 1)), fim: fmt8(new Date(ano, 11, 31)), label: 'Período ' + (compPeriodos.length + 1) });
  renderCompPeriodos();
}

function rmPeriodo(i) {
  compPeriodos.splice(i, 1);
  renderCompPeriodos();
}

async function gerarComparativo() {
  // Validar
  for (let i = 0; i < compPeriodos.length; i++) {
    const p = compPeriodos[i];
    if (!p.ini || !p.fim) { alert(`Preencha as datas do período ${i + 1}`); return; }
    if (p.fim < p.ini)    { alert(`Data Fim do período ${i + 1} não pode ser anterior à Data Início`); return; }
  }

  const btn = document.getElementById('btnGerarComp');
  btn.disabled = true; btn.textContent = 'Consultando…';
  document.getElementById('resultado').innerHTML =
    '<div class="loading-state"><div class="spinner"></div><p>Consultando Oracle para ' + compPeriodos.length + ' períodos…</p></div>';
  document.getElementById('compCards').style.display = 'none';

  try {
    // Buscar dados de cada período em paralelo (filtros individuais por período)
    const resultados = await Promise.all(compPeriodos.map(p => {
      let url = `api/fluxo-realizado?dataIni=${p.ini}&dataFim=${p.fim}`;
      if (p.descCana)                        url += '&descCana=S';
      if (p.descEntrada && p.dataEntradaMin) url += '&dataEntradaMin=' + p.dataEntradaMin;
      return fetch(url)
        .then(r => r.json())
        .then(j => { if (!j.ok) throw new Error(j.erro); return j.data; });
    }));

    renderComparativo(resultados);

  } catch(e) {
    document.getElementById('resultado').innerHTML =
      '<div class="erro-state"><p>❌ ' + e.message + '</p></div>';
  } finally {
    btn.disabled = false; btn.textContent = '▶ Gerar Comparativo';
  }
}

function renderComparativo(resultados) {
  const agrupar = document.getElementById('agrupar').value;

  // Agrupar cada período
  const gruposPorPeriodo = resultados.map(dados => {
    const mapa = {};
    dados.forEach(d => {
      const chave = getChave(d, agrupar);
      const label = getLabel(d, agrupar);
      if (!mapa[chave]) mapa[chave] = { label, total: 0 };
      mapa[chave].total += (d.realizado || 0);
    });
    return mapa;
  });

  // Todas as chaves únicas
  const todasChaves = [...new Set(resultados.flat().map(d => getChave(d, agrupar)))];
  const todosGrupos = todasChaves.map(chave => {
    const label = getLabel(resultados.flat().find(d => getChave(d, agrupar) === chave) || {}, agrupar) || chave;
    const totaisPorPeriodo = gruposPorPeriodo.map(g => g[chave]?.total || 0);
    const totalGeral = totaisPorPeriodo.reduce((a, b) => a + b, 0);
    return { chave, label, totaisPorPeriodo, totalGeral };
  }).filter(g => g.totalGeral > 0).sort((a, b) => b.totalGeral - a.totalGeral);

  // Totais por período
  const totaisPeriodo = compPeriodos.map((_, i) =>
    todosGrupos.reduce((s, g) => s + g.totaisPorPeriodo[i], 0)
  );
  const totalGeralGeral = totaisPeriodo.reduce((a, b) => a + b, 0);

  // Cards de resumo
  const cardsEl = document.getElementById('compCards');
  cardsEl.style.display = 'flex';
  cardsEl.innerHTML = compPeriodos.map((p, i) => `
    <div class="card-comp" style="border-color:${COR_COLS[i % COR_COLS.length]}">
      <div class="lbl" style="color:${COR_COLS[i % COR_COLS.length]}">${esc(p.label)}</div>
      <div class="val" style="color:${COR_COLS[i % COR_COLS.length]}">${fmtMilhoes(totaisPeriodo[i])}</div>
      <div class="sub">${totaisPeriodo[i].toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
    </div>`).join('') + `
    <div class="card-comp total">
      <div class="lbl">DIFERENÇA</div>
      <div class="val" style="color:${totaisPeriodo.length>=2&&(totaisPeriodo[totaisPeriodo.length-1]-totaisPeriodo[0])>=0?'#166534':'#dc2626'}">${totaisPeriodo.length>=2?fmtMilhoes(totaisPeriodo[totaisPeriodo.length-1]-totaisPeriodo[0]):fmtMilhoes(totalGeralGeral)}</div>
      <div class="sub">${todosGrupos.length} grupos · ${totaisPeriodo.length>=2&&totaisPeriodo[0]!==0?((totaisPeriodo[totaisPeriodo.length-1]-totaisPeriodo[0])/Math.abs(totaisPeriodo[0])*100).toFixed(1)+"%":""}</div>
    </div>`;

  // Cabeçalho tabela
  const thPeriodos = compPeriodos.map((p, i) =>
    `<th class="semana col-${i}">${esc(p.label)}</th>`).join('');
  const tdTotaisPeriodos = compPeriodos.map((_, i) =>
    `<td><strong>${fmtRn(totaisPeriodo[i])}</strong></td>`).join('');

  // Linhas
  const rows = todosGrupos.map((g, idx) => {
    const tdPeriodos = g.totaisPorPeriodo.map((v, pi) =>
      `<td class="valor-clicavel" onclick="abrirModalFornecedoresComp(${idx}, ${pi})">${v > 0 ? fmtRn(v) : '<span class="zero">—</span>'}</td>`).join('');
    return `
      <tr class="item-row" id="crow-${idx}">
        <td class="item-nome valor-clicavel" onclick="abrirModalFornecedoresComp(${idx})">${esc(g.label)}</td>
        ${tdPeriodos}
        <td class="valor-clicavel" onclick="abrirModalFornecedoresComp(${idx})" style="font-weight:700;color:${g.totaisPorPeriodo.length>=2&&(g.totaisPorPeriodo[g.totaisPorPeriodo.length-1]-g.totaisPorPeriodo[0])>=0?'#166534':'#dc2626'}">${fmtRn(g.totaisPorPeriodo.length>=2 ? g.totaisPorPeriodo[g.totaisPorPeriodo.length-1]-g.totaisPorPeriodo[0] : g.totalGeral)}</td>
        <td class="valor-clicavel" onclick="abrirModalFornecedoresComp(${idx})" style="font-weight:700;color:${g.totaisPorPeriodo.length>=2&&(g.totaisPorPeriodo[g.totaisPorPeriodo.length-1]-g.totaisPorPeriodo[0])>=0?'#166534':'#dc2626'}">${g.totaisPorPeriodo.length>=2&&g.totaisPorPeriodo[0]!==0?((g.totaisPorPeriodo[g.totaisPorPeriodo.length-1]-g.totaisPorPeriodo[0])/Math.abs(g.totaisPorPeriodo[0])*100).toFixed(1)+"%":"—"}</td>
      </tr>`;
  }).join('');

  document.getElementById('resultado').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Item / Descrição</th>
          ${thPeriodos}
          <th class="col-total-comp total-col">Diferença</th><th class="col-total-comp total-col">Var. %</th>
        </tr>
      </thead>
      <tbody>
        <tr class="total-topo">
          <td>▸ TOTAL DO PERÍODO</td>
          ${tdTotaisPeriodos}
          <td>${fmtRn(totaisPeriodo.length >= 2 ? totaisPeriodo[totaisPeriodo.length-1] - totaisPeriodo[0] : totalGeralGeral)}</td>
          <td>${totaisPeriodo.length >= 2 && totaisPeriodo[0] !== 0 ? ((totaisPeriodo[totaisPeriodo.length-1] - totaisPeriodo[0]) / Math.abs(totaisPeriodo[0]) * 100).toFixed(1) + "%" : "—"}</td>
        </tr>
        ${rows}
      </tbody>
    </table>`;

  // Guardar para detalhe
  window._compGrupos   = todosGrupos;
  window._compResultados = resultados;
  ajustarStickyTotal();
}

// Abre a caixa (modal) com o valor por fornecedor/empenho (maior para o
// menor), só do grupo clicado. Se periodoIdx for informado, mostra só
// aquele período; caso contrário, todos os períodos somados.
function abrirModalFornecedoresComp(idx, periodoIdx) {
  const g = window._compGrupos[idx];
  const idxs = (periodoIdx != null) ? [periodoIdx] : compPeriodos.map((_, i) => i);

  const thPeriodos = idxs.map(i =>
    `<th style="background:#d4dff5;color:${COR_COLS[i%COR_COLS.length]}">${esc(compPeriodos[i].label)}</th>`).join('');

  // Linhas de detalhe por fornecedor/empenho dentro do grupo, restrito ao
  // período clicado quando informado.
  const agrupar = document.getElementById('agrupar').value;
  const subMap = {};
  window._compResultados.forEach((dados, pi) => {
    if (!idxs.includes(pi)) return;
    dados.filter(d => getChave(d, agrupar) === g.chave).forEach(d => {
      const k = d.nome || d.descEmpenho || '—';
      if (!subMap[k]) subMap[k] = {};
      subMap[k][pi] = (subMap[k][pi] || 0) + (d.realizado || 0);
    });
  });

  const subRows = Object.entries(subMap)
    .map(([nome, vals]) => ({ nome, vals, total: idxs.reduce((s, i) => s + (vals[i] || 0), 0) }))
    .sort((a, b) => b.total - a.total)
    .map(({ nome, vals }) => `
    <tr>
      <td>${esc(nome)}</td>
      ${idxs.map(i => `<td>${vals[i] ? fmtRn(vals[i]) : '<span class="zero">—</span>'}</td>`).join('')}
    </tr>`).join('');

  const tituloPeriodo = (periodoIdx != null) ? ' · ' + compPeriodos[periodoIdx].label : '';
  document.getElementById('modalFornecedoresTitulo').textContent = 'Valor por Fornecedor — ' + g.label + tituloPeriodo;
  document.getElementById('modalFornecedoresBody').innerHTML = `
    <div class="detalhe-inner">
      <table>
        <thead><tr>
          <th>Fornecedor / Empenho</th>${thPeriodos}
        </tr></thead>
        <tbody>${subRows}</tbody>
      </table>
    </div>`;
  document.getElementById('modalFornecedores').classList.add('aberto');
}

function fmtRn(v) {
  if (!v || v === 0) return '<span class="zero">—</span>';
  return v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
