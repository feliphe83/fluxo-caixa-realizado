<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir senha · Intranet USC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f4f6fb; color: #1a1a2e;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    background: white; border: 1.5px solid #e3e8f5; border-radius: 16px;
    padding: 36px 32px; width: 100%; max-width: 420px;
  }
  .icone {
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg, #1a3a7c, #0f2460);
    color: white; display: flex; align-items: center; justify-content: center;
    margin-bottom: 18px;
  }
  .icone.erro { background: linear-gradient(135deg, #ef4444, #b91c1c); }
  .titulo { font-size: 19px; font-weight: 800; color: #0f2460; margin-bottom: 6px; }
  .sub { font-size: 13px; color: #64748b; margin-bottom: 26px; line-height: 1.5; }

  .campo { margin-bottom: 18px; }
  .campo label { display: block; font-size: 12px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 7px; }
  .campo input {
    width: 100%; padding: 11px 14px; border: 1.5px solid #d8dfee; border-radius: 9px;
    font-size: 14px; color: #1a1a2e; outline: none;
  }
  .campo input:focus { border-color: #1a3a7c; }
  .campo .erro-msg { font-size: 11.5px; color: #ef4444; margin-top: 6px; display: none; }

  .btn-salvar {
    width: 100%; padding: 13px; border-radius: 10px; border: none;
    background: #1a3a7c; color: white; font-size: 14.5px; font-weight: 700;
    cursor: pointer; margin-top: 8px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-salvar:hover { background: #0f2460; }
  .btn-salvar:disabled { background: #9ca3af; cursor: not-allowed; }

  .voltar-login {
    display: block; text-align: center; margin-top: 20px;
    font-size: 13px; color: #1a3a7c; text-decoration: none; font-weight: 600;
  }
  .voltar-login:hover { text-decoration: underline; }

  .estado-sucesso, .estado-erro { display: none; text-align: center; }
  .estado-sucesso .icone-check, .estado-erro .icone-x {
    width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
  }
  .estado-sucesso .icone-check { background: #dcfce7; color: #16a34a; }
  .estado-erro .icone-x { background: #fee2e2; color: #ef4444; }
  .estado-sucesso p, .estado-erro p { font-size: 13.5px; color: #475569; line-height: 1.6; }
</style>
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="img/apple-touch-icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="img/apple-touch-icon-167.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="USC">
  <meta name="theme-color" content="#0f2460">
</head>
<body>

<div class="card">

  <div id="estadoFormulario" style="display:none">
    <div class="icone">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
    </div>
    <div class="titulo">Redefinir senha</div>
    <div class="sub">Escolha uma nova senha de acesso à Intranet.</div>

    <div class="campo">
      <label>Nova Senha</label>
      <input type="password" id="novaSenha" placeholder="Mínimo 6 caracteres" oninput="validar()">
    </div>
    <div class="campo">
      <label>Confirmar Nova Senha</label>
      <input type="password" id="confirmaSenha" placeholder="Repita a nova senha" oninput="validar()">
      <div class="erro-msg" id="erroConfirma">As senhas não coincidem.</div>
    </div>

    <button class="btn-salvar" id="btnSalvar" onclick="salvarSenha()" disabled>
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
      Salvar Nova Senha
    </button>
  </div>

  <div class="estado-sucesso" id="estadoSucesso">
    <div class="icone-check">
      <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <div class="titulo" style="text-align:center">Senha redefinida!</div>
    <p>Sua senha foi alterada com sucesso. Você já pode fazer login com a nova senha.</p>
    <a href="login.html" class="voltar-login">Ir para o login →</a>
  </div>

  <div class="estado-erro" id="estadoErro">
    <div class="icone-x">
      <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <div class="titulo" style="text-align:center">Link inválido</div>
    <p id="msgErro">Este link de redefinição é inválido ou expirou.</p>
    <a href="esqueci-senha.html" class="voltar-login">Solicitar novo link →</a>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (!token) {
  mostrarErro('Link inválido — token não encontrado na URL.');
} else {
  document.getElementById('estadoFormulario').style.display = 'block';
}

function validar() {
  const nova = document.getElementById('novaSenha').value;
  const confirma = document.getElementById('confirmaSenha').value;
  const erro = document.getElementById('erroConfirma');
  const btn = document.getElementById('btnSalvar');

  const coincide = nova === confirma;
  const tamanhoOk = nova.length >= 6;

  erro.style.display = (confirma.length > 0 && !coincide) ? 'block' : 'none';
  btn.disabled = !(tamanhoOk && coincide && confirma.length > 0);
}

async function salvarSenha() {
  const novaSenha = document.getElementById('novaSenha').value;
  const btn = document.getElementById('btnSalvar');

  btn.disabled = true;
  btn.textContent = 'Salvando…';

  try {
    const r = await fetch('api/redefinir-senha', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, novaSenha })
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.erro);

    document.getElementById('estadoFormulario').style.display = 'none';
    document.getElementById('estadoSucesso').style.display = 'block';

  } catch(e) {
    mostrarErro(e.message);
  }
}

function mostrarErro(msg) {
  document.getElementById('estadoFormulario').style.display = 'none';
  document.getElementById('estadoSucesso').style.display = 'none';
  document.getElementById('estadoErro').style.display = 'block';
  document.getElementById('msgErro').textContent = msg;
}
</script>

</body>
</html>
