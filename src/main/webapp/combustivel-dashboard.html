<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Executivo · Consumo de Combustível</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --serie-1: #2a78d6;   /* azul — base */
    --serie-2: #eb6834;   /* laranja */
    --serie-3: #1baf7a;   /* água — maior/destaque positivo */
    --serie-4: #eda100;   /* amarelo */
    --serie-5: #e87ba4;   /* magenta */
    --serie-6: #008300;   /* verde — última semana */
    --serie-8: #e34948;   /* vermelho — menor/alerta */
    --serie-outros: #98a2b3;
    --ink: #0f2460;
    --ink-2: #52514e;
    --ink-3: #898781;
    --grade: #e9edf6;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f4f6fb;
    color: #1a1a2e;
  }

  .header {
    background: linear-gradient(135deg, #0f2460 0%, #1a3a7c 100%);
    color: white;
    padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo { width: 38px; height: 38px; border-radius: 8px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; }
  .header-title { font-size: 16px; font-weight: 700; }
  .header-sub { font-size: 11px; opacity: .75; margin-top: 2px; }
  .btn-voltar {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 16px; border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9);
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .btn-voltar:hover { background: rgba(255,255,255,0.18); }

  .conteudo { max-width: 1360px; margin: 0 auto; padding: 24px; }

  /* ── Filtros ── */
  .filtros-card {
    background: white; border: 1.5px solid #e3e8f5; border-radius: 14px;
    padding: 18px 22px; margin-bottom: 20px;
  }
  .filtros-grid { display: grid; grid-template-columns: 1fr 1fr 1.2fr auto; gap: 14px; align-items: end; }
  .campo label { display: block; font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
  .campo input { width: 100%; padding: 8px 10px; border: 1.5px solid #d8dfee; border-radius: 8px; font-size: 13px; color: #1a1a2e; outline: none; height: 38px; background: white; }
  .campo input:focus { border-color: #1a3a7c; }
  .btn-gerar {
    padding: 0 20px; border-radius: 9px; border: none;
    background: #1a3a7c; color: white; font-size: 13.5px; font-weight: 700;
    cursor: pointer; height: 38px; display: flex; align-items: center; gap: 8px;
  }
  .btn-gerar:hover { background: #0f2460; }
  .btn-gerar:disabled { background: #9ca3af; cursor: not-allowed; }
  .presets { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .preset { padding: 5px 12px; border-radius: 999px; border: 1.5px solid #d8dfee; background: white; color: #475569; font-size: 12px; font-weight: 600; cursor: pointer; }
  .preset:hover { border-color: #1a3a7c; color: #1a3a7c; }

  .export-bar { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 16px; }
  .btn-export {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 8px; border: 1.5px solid #d8dfee;
    background: white; color: #475569; font-size: 12.5px; font-weight: 600; cursor: pointer;
  }
  .btn-export:hover { border-color: #1a3a7c; color: #1a3a7c; }

  /* ── Seções ── */
  .secao { background: white; border: 1.5px solid #e3e8f5; border-radius: 14px; padding: 22px 24px; margin-bottom: 20px; }
  .secao-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .secao-num {
    width: 22px; height: 22px; border-radius: 6px; background: var(--ink); color: white;
    font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .secao-titulo { font-size: 16px; font-weight: 800; color: var(--ink); }
  .secao-sub { font-size: 12px; color: var(--ink-3); margin: 2px 0 16px 32px; }

  .insight-box {
    display: flex; gap: 12px; background: #f5f7fb; border-left: 3px solid var(--serie-3);
    border-radius: 8px; padding: 12px 16px; margin-top: 16px; font-size: 12.5px; color: var(--ink-2); line-height: 1.55;
  }
  .insight-box b { color: var(--ink); }
  .insight-icone { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: var(--serie-3); color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; }

  /* ── KPIs ── */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
  .kpi { background: #f8faff; border: 1px solid #e3e8f5; border-radius: 12px; padding: 14px 16px; }
  .kpi .rotulo { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .3px; margin-bottom: 6px; }
  .kpi .valor { font-size: 22px; font-weight: 800; color: var(--ink); line-height: 1.1; }
  .kpi .sub { font-size: 11px; color: var(--ink-3); margin-top: 4px; }

  .split-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 4px; }
  .split-card { border-radius: 12px; padding: 14px 16px; color: white; }
  .split-card.propria { background: linear-gradient(135deg, #1a3a7c, #0f2460); }
  .split-card.terceiro { background: linear-gradient(135deg, #2a4f9c, #1a3a7c); }
  .split-card .rotulo { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; opacity: .85; }
  .split-card .valor { font-size: 22px; font-weight: 800; margin: 4px 0 8px; }
  .split-card .linhas { font-size: 11.5px; opacity: .9; display: flex; flex-direction: column; gap: 3px; }

  /* ── Gráficos ── */
  .grafico-area { position: relative; height: 300px; margin-top: 6px; }
  .toggle-medida { display: flex; border: 1.5px solid #d8dfee; border-radius: 8px; overflow: hidden; margin-left: auto; }
  .toggle-medida button { padding: 5px 12px; border: none; background: white; color: #475569; font-size: 12px; font-weight: 600; cursor: pointer; }
  .toggle-medida button.ativo { background: #1a3a7c; color: white; }
  .legenda-manual { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px; font-size: 11.5px; color: var(--ink-2); }
  .legenda-manual .item { display: flex; align-items: center; gap: 6px; }
  .legenda-manual .dot { width: 9px; height: 9px; border-radius: 3px; }

  /* ── Distribuição ── */
  .distrib-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 20px; }
  table.tabela-simples { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.tabela-simples thead th { background: #eef2fb; color: var(--ink); text-align: left; padding: 8px 10px; font-size: 11px; text-transform: uppercase; letter-spacing: .3px; }
  table.tabela-simples thead th.num { text-align: right; }
  table.tabela-simples tbody td { padding: 8px 10px; border-bottom: 1px solid #eef1f8; }
  table.tabela-simples tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.tabela-simples tbody tr:last-child td { border-bottom: none; font-weight: 700; background: #f5f7fb; }
  .barra-participacao { display: inline-block; width: 60px; height: 6px; border-radius: 3px; background: #e3e8f5; overflow: hidden; vertical-align: middle; margin-right: 8px; }
  .barra-participacao .fill { height: 100%; background: var(--serie-1); border-radius: 3px; }

  /* ── Classe Operativa (matriz/heatmap) ── */
  .matriz-scroll { overflow-x: auto; }
  table.matriz { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 900px; }
  table.matriz thead th { background: var(--ink); color: white; padding: 7px 8px; font-size: 9.5px; text-transform: uppercase; text-align: right; white-space: nowrap; }
  table.matriz thead th:first-child { text-align: left; min-width: 160px; }
  table.matriz tbody td { padding: 6px 8px; text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; color: var(--ink); }
  table.matriz tbody td:first-child { text-align: left; font-weight: 600; background: white !important; }
  table.matriz tbody tr.total td { background: #eef2fb !important; font-weight: 800; border-top: 2px solid var(--ink); color: var(--ink) !important; }

  /* ── Rankings ── */
  table.ranking { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.ranking thead th { background: var(--ink); color: white; text-align: left; padding: 9px 12px; font-size: 10.5px; text-transform: uppercase; letter-spacing: .3px; white-space: nowrap; }
  table.ranking thead th.num { text-align: right; }
  table.ranking tbody td { padding: 8px 12px; border-bottom: 1px solid #eef1f8; white-space: nowrap; }
  table.ranking tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.ranking tbody tr:hover { background: #f8faff; }
  .posicao-badge { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; background: #eef2fb; color: var(--ink); font-size: 10.5px; font-weight: 800; }
  .posicao-badge.top1 { background: var(--ink); color: white; }

  .loading-state, .erro-state, .vazio-state { text-align: center; padding: 60px 20px; color: #94a0b8; }
  .spinner { width: 30px; height: 30px; border: 3px solid #e3e8f5; border-top-color: #1a3a7c; border-radius: 50%; margin: 0 auto 12px; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .erro-state { color: #ef4444; }
  #painel.atualizando { opacity: .5; pointer-events: none; transition: opacity .15s; }

  .detalhe-toggle { text-align: center; margin-top: 4px; }
  .detalhe-toggle button { background: none; border: none; color: var(--serie-1); font-size: 12.5px; font-weight: 600; cursor: pointer; padding: 8px; }

  @media (max-width: 1000px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .split-row { grid-template-columns: 1fr; }
    .distrib-grid { grid-template-columns: 1fr; }
    .filtros-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">USC</div>
    <div>
      <div class="header-title">Relatório Executivo · Consumo de Combustível</div>
      <div class="header-sub">Visão consolidada por combustível · Usina Santa Clotilde</div>
    </div>
  </div>
  <button class="btn-voltar" onclick="window.location.href='hub.html'">
    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Voltar
  </button>
</div>

<div class="conteudo">

  <div class="filtros-card">
    <div class="filtros-grid">
      <div class="campo"><label>Data Início</label><input type="date" id="dataIni"></div>
      <div class="campo"><label>Data Fim</label><input type="date" id="dataFim"></div>
      <div class="campo">
        <label>Combustível</label>
        <input type="text" id="fCombustivel" list="listaCombustivel" value="Diesel" placeholder="Ex.: Diesel, Gasolina, Etanol">
        <datalist id="listaCombustivel"></datalist>
      </div>
      <button class="btn-gerar" id="btnGerar" onclick="carregar()">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Gerar Relatório
      </button>
    </div>
    <div class="presets">
      <button class="preset" onclick="preset(4)">Últimas 4 semanas</button>
      <button class="preset" onclick="preset(8)">Últimas 8 semanas</button>
      <button class="preset" onclick="preset(17)">Últimas 17 semanas</button>
      <button class="preset" onclick="preset(26)">Últimas 26 semanas</button>
    </div>
  </div>

  <div id="painel">
    <div class="loading-state"><div class="spinner"></div><p>Consultando abastecimentos…</p></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let DADOS = null;
let charts = {};
let medidaSemanal = 'volume'; // 'volume' | 'custo'
let detalheAberto = false;

const fmtInt  = new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 0 });
const fmtDec  = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtBRL  = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
const fmtBRL0 = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 });
const fmtPct  = v => fmtDec.format(v) + '%';

function fmt8(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

function preset(semanas) {
  const hoje = new Date();
  const ini = new Date(hoje.getTime() - (semanas * 7 - 1) * 864e5);
  document.getElementById('dataIni').value = fmt8(ini);
  document.getElementById('dataFim').value = fmt8(hoje);
  carregar();
}

(function initDatas() {
  const hoje = new Date();
  const ini = new Date(hoje.getTime() - 118 * 864e5); // ~17 semanas
  document.getElementById('dataIni').value = fmt8(ini);
  document.getElementById('dataFim').value = fmt8(hoje);
})();

async function carregar() {
  const dataIni = document.getElementById('dataIni').value;
  const dataFim = document.getElementById('dataFim').value;
  if (!dataIni || !dataFim) { alert('Informe o período completo.'); return; }
  if (dataFim < dataIni) { alert('Data Fim não pode ser anterior à Data Início.'); return; }

  const painel = document.getElementById('painel');
  const btn = document.getElementById('btnGerar');
  btn.disabled = true;
  if (DADOS) painel.classList.add('atualizando');

  const p = new URLSearchParams({ dataIni, dataFim });
  const combustivel = document.getElementById('fCombustivel').value.trim();
  if (combustivel) p.set('combustivel', combustivel);

  try {
    const r = await fetch('api/combustivel-dashboard?' + p.toString(), { headers: { 'Accept': 'application/json' } });
    const j = await r.json();
    if (j.redirect) { window.location.href = 'login.html'; return; }
    if (!j.ok) throw new Error(j.erro || 'Erro na consulta');

    DADOS = j;
    atualizarListaCombustiveis(j.opcoes);
    renderizar();

  } catch (e) {
    Object.values(charts).forEach(c => c.destroy());
    charts = {};
    DADOS = null;
    painel.innerHTML = '<div class="erro-state"><p>❌ ' + escapeHtml(e.message) + '</p></div>';
  } finally {
    btn.disabled = false;
    painel.classList.remove('atualizando');
  }
}

function atualizarListaCombustiveis(opcoes) {
  const dl = document.getElementById('listaCombustivel');
  dl.innerHTML = (opcoes.combustiveis || [])
    .map(o => `<option value="${escapeHtml(o.descricao)}"></option>`).join('');
}

// ── Renderização geral ───────────────────────────────────────────────────

function renderizar() {
  const j = DADOS;
  const painel = document.getElementById('painel');
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  if (!j.totalLinhas) {
    painel.innerHTML = '<div class="vazio-state"><p>Nenhum abastecimento encontrado no período com os filtros escolhidos.</p></div>';
    return;
  }

  painel.innerHTML = `
    ${secaoResumoExecutivo(j)}
    ${secaoEvolucaoPreco(j)}
    ${secaoDistribuicao(j)}
    ${secaoClasseOperativa(j)}
    ${secaoRanking('5', 'Top 10 Equipamentos Próprios', 'Ranking por volume consumido · frota própria', j.topProprios, 'proprios', kpisProprios(j))}
    ${secaoRanking('6', 'Top 10 Terceiros', 'Ranking por proprietário de equipamento', j.topTerceiros, 'terceiros', kpisTerceiros(j))}
    <div class="export-bar" style="margin-top:0">
      <div style="flex:1;font-size:12px;color:var(--ink-3);align-self:center">
        ${j.truncadoDetalhe ? 'Detalhamento limitado aos ' + fmtInt.format(j.detalhe.length) + ' abastecimentos mais recentes (de ' + fmtInt.format(j.totalLinhas) + ' no período).' : fmtInt.format(j.totalLinhas) + ' abastecimentos no período.'}
      </div>
      <button class="btn-export" onclick="exportarExcel()">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        Exportar Excel
      </button>
      <button class="btn-export" onclick="window.print()">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimir
      </button>
    </div>
  `;

  desenharConsumoSemanal();
  desenharPreco();
  desenharAtividades();
  desenharDistribuicaoSemanal();
}

// ── 1. Resumo Executivo ──────────────────────────────────────────────────

function secaoResumoExecutivo(j) {
  const k = j.kpis;
  return `
  <div class="secao">
    <div class="secao-header"><span class="secao-num">1</span><span class="secao-titulo">Resumo Executivo</span></div>
    <div class="secao-sub">Visão consolidada do consumo · ${j.semanas.length} semanas operacionais</div>

    <div class="kpi-row">
      ${kpi('Volume Total Consumido', fmtInt.format(k.volumeTotal) + ' L', 'Média semanal: ' + fmtInt.format(k.mediaSemanalVolume) + ' L')}
      ${kpi('Custo Total no Período', fmtBRL0.format(k.custoTotal), 'Média semanal: ' + fmtBRL0.format(k.mediaSemanalCusto))}
      ${kpi('Preço Médio Ponderado', fmtBRL.format(k.precoMedioPonderado) + '/L', '')}
      ${kpi('Equipamentos Monitorados', fmtInt.format(k.equipamentosMonitorados) + ' unid.', k.propria.equipamentos + ' próprios + ' + k.terceiro.equipamentos + ' terceiros')}
    </div>

    <div class="split-row">
      ${splitCard('propria', 'Equipamentos Próprios', k.propria)}
      ${splitCard('terceiro', 'Equipamentos Terceiros', k.terceiro)}
    </div>

    <div style="display:flex;align-items:center;gap:10px;margin-top:18px">
      <div style="font-size:13px;font-weight:700;color:var(--ink)">Consumo Semanal</div>
      <div class="toggle-medida">
        <button id="tgVolume" class="${medidaSemanal==='volume'?'ativo':''}" onclick="trocarMedidaSemanal('volume')">Volume (L)</button>
        <button id="tgCusto" class="${medidaSemanal==='custo'?'ativo':''}" onclick="trocarMedidaSemanal('custo')">Custo (R$)</button>
      </div>
    </div>
    <div class="grafico-area"><canvas id="chConsumoSemanal"></canvas></div>
    <div class="legenda-manual">
      <span class="item"><span class="dot" style="background:var(--serie-1)"></span>Semana comum</span>
      <span class="item"><span class="dot" style="background:var(--serie-3)"></span>Maior volume</span>
      <span class="item"><span class="dot" style="background:var(--serie-8)"></span>Menor volume</span>
      <span class="item"><span class="dot" style="background:var(--serie-6)"></span>Última semana</span>
      <span class="item">- - - Tendência (média móvel)</span>
    </div>
    <div class="insight-box"><span class="insight-icone">i</span><div>${insightResumo(j)}</div></div>
  </div>`;
}

function kpi(rotulo, valor, sub) {
  return `<div class="kpi"><div class="rotulo">${rotulo}</div><div class="valor">${valor}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`;
}

function splitCard(classe, titulo, k) {
  return `
    <div class="split-card ${classe}">
      <div class="rotulo">${titulo}</div>
      <div class="valor">${fmtInt.format(k.equipamentos)} unid.</div>
      <div class="linhas">
        <span>Volume: ${fmtInt.format(k.volume)} L · ${fmtDec.format(k.participacaoVolume)}% do total</span>
        <span>Custo: ${fmtBRL0.format(k.custo)} · Preço médio: ${fmtBRL.format(k.precoMedio)}/L</span>
        <span>Média semanal: ${fmtInt.format(k.mediaSemanalVolume)} L${k.proprietariosAtivos ? ' · ' + k.proprietariosAtivos + ' fornecedores ativos' : ''}</span>
      </div>
    </div>`;
}

function insightResumo(j) {
  const serie = j.serieSemanal;
  const maxS = serie.reduce((a,b) => b.volume > a.volume ? b : a);
  const minS = serie.reduce((a,b) => b.volume < a.volume ? b : a);
  const ultima = serie[serie.length - 1];
  return `O consumo semanal variou entre <b>${fmtInt.format(minS.volume)} L</b> (semana de ${minS.label}) e ` +
    `<b>${fmtInt.format(maxS.volume)} L</b> (semana de ${maxS.label}). Na última semana registrada (${ultima.label}), ` +
    `o volume foi de <b>${fmtInt.format(ultima.volume)} L</b>, ao custo de <b>${fmtBRL0.format(ultima.custo)}</b>.`;
}

function trocarMedidaSemanal(m) {
  medidaSemanal = m;
  document.getElementById('tgVolume').classList.toggle('ativo', m === 'volume');
  document.getElementById('tgCusto').classList.toggle('ativo', m === 'custo');
  desenharConsumoSemanal();
}

const eixoBase = {
  grid: { color: '#e9edf6', drawTicks: false },
  border: { display: false },
  ticks: { color: '#898781', font: { size: 11 } },
};

function mediaMovel(valores, janela) {
  const meio = Math.floor(janela / 2);
  return valores.map((_, i) => {
    const ini = Math.max(0, i - meio), fim = Math.min(valores.length, i + meio + 1);
    const fatia = valores.slice(ini, fim);
    return fatia.reduce((a,b) => a+b, 0) / fatia.length;
  });
}

function desenharConsumoSemanal() {
  const serie = DADOS.serieSemanal;
  const valores = serie.map(s => medidaSemanal === 'volume' ? s.volume : s.custo);
  const emVolume = medidaSemanal === 'volume';

  let idxMax = 0, idxMin = 0;
  serie.forEach((s, i) => {
    if (s.volume > serie[idxMax].volume) idxMax = i;
    if (s.volume < serie[idxMin].volume) idxMin = i;
  });
  const idxUltima = serie.length - 1;

  const cores = serie.map((s, i) => {
    if (i === idxUltima) return getCss('--serie-6');
    if (i === idxMax) return getCss('--serie-3');
    if (i === idxMin) return getCss('--serie-8');
    return getCss('--serie-1');
  });

  novoChart('chConsumoSemanal', {
    type: 'bar',
    data: {
      labels: serie.map(s => s.label),
      datasets: [
        {
          type: 'bar', label: emVolume ? 'Volume (L)' : 'Custo (R$)',
          data: valores, backgroundColor: cores, maxBarThickness: 22, borderRadius: 4, borderSkipped: 'bottom',
          order: 2,
        },
        {
          type: 'line', label: 'Tendência', data: mediaMovel(valores, 3),
          borderColor: '#52514e', borderDash: [5,4], borderWidth: 2, pointRadius: 0, fill: false, order: 1,
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => c.dataset.label + ': ' + (emVolume ? fmtInt.format(c.parsed.y) + ' L' : fmtBRL.format(c.parsed.y)) } }
      },
      scales: {
        x: { ...eixoBase, grid: { display: false }, ticks: { ...eixoBase.ticks, maxTicksLimit: 20, maxRotation: 0 } },
        y: { ...eixoBase, beginAtZero: true, ticks: { ...eixoBase.ticks, callback: v => emVolume ? fmtInt.format(v) : fmtBRL0.format(v) } }
      }
    }
  });
}

function getCss(varName) {
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

// ── 2. Evolução do Preço ─────────────────────────────────────────────────

function secaoEvolucaoPreco(j) {
  const serie = j.serieSemanal;
  const precos = serie.map(s => s.precoMedio).filter(v => v > 0);
  const media = precos.reduce((a,b)=>a+b,0) / (precos.length || 1);
  const min = Math.min(...precos), max = Math.max(...precos);
  const variacao = precos.length > 1 ? ((precos[precos.length-1] - precos[0]) / precos[0] * 100) : 0;

  return `
  <div class="secao">
    <div class="secao-header"><span class="secao-num">2</span><span class="secao-titulo">Evolução do Preço do Combustível</span></div>
    <div class="secao-sub">Preço médio ponderado semanal (R$/L)</div>

    <div class="kpi-row">
      ${kpi('Preço Médio do Período', fmtBRL.format(media) + '/L', 'Base: ' + j.semanas.length + ' semanas operacionais')}
      ${kpi('Menor Preço Semanal', fmtBRL.format(min) + '/L', '')}
      ${kpi('Maior Preço Semanal', fmtBRL.format(max) + '/L', '')}
      ${kpi('Variação no Período', (variacao>=0?'+':'') + fmtDec.format(variacao) + '%', 'De ' + fmtBRL.format(precos[0]||0) + ' para ' + fmtBRL.format(precos[precos.length-1]||0))}
    </div>

    <div class="grafico-area"><canvas id="chPreco"></canvas></div>
    <div class="legenda-manual">
      <span class="item"><span class="dot" style="background:var(--serie-1)"></span>Preço médio semanal</span>
      <span class="item"><span class="dot" style="background:var(--serie-3)"></span>Menor preço</span>
      <span class="item"><span class="dot" style="background:var(--serie-8)"></span>Maior preço</span>
      <span class="item">- - - Média do período</span>
    </div>
    <div class="insight-box"><span class="insight-icone">i</span><div>${insightPreco(precos, media, variacao)}</div></div>
  </div>`;
}

function insightPreco(precos, media, variacao) {
  if (!precos.length) return 'Sem dados de preço suficientes no período.';
  const sentido = variacao >= 0 ? 'alta' : 'queda';
  return `O preço médio fechou em <b>${sentido} de ${fmtDec.format(Math.abs(variacao))}%</b> no período, ` +
    `de <b>${fmtBRL.format(precos[0])}/L</b> para <b>${fmtBRL.format(precos[precos.length-1])}/L</b>, com média de <b>${fmtBRL.format(media)}/L</b>.`;
}

function desenharPreco() {
  const serie = DADOS.serieSemanal;
  const precos = serie.map(s => s.precoMedio);
  const validos = precos.map((v,i) => ({v,i})).filter(x => x.v > 0);
  const media = validos.reduce((a,b)=>a+b.v,0) / (validos.length || 1);
  let idxMax = validos[0]?.i || 0, idxMin = validos[0]?.i || 0;
  validos.forEach(x => { if (x.v > precos[idxMax]) idxMax = x.i; if (x.v < precos[idxMin]) idxMin = x.i; });

  const pointColors = precos.map((v, i) => {
    if (v === 0) return 'transparent';
    if (i === idxMax) return getCss('--serie-8');
    if (i === idxMin) return getCss('--serie-3');
    return getCss('--serie-1');
  });
  const pointRadius = precos.map((v, i) => (i === idxMax || i === idxMin) ? 6 : 3);

  novoChart('chPreco', {
    type: 'line',
    data: {
      labels: serie.map(s => s.label),
      datasets: [
        {
          label: 'Preço médio (R$/L)', data: precos,
          borderColor: getCss('--serie-1'), backgroundColor: 'rgba(42,120,214,0.08)', fill: true,
          borderWidth: 2, pointRadius, pointBackgroundColor: pointColors, pointBorderColor: '#fff', pointBorderWidth: 2,
          tension: 0.2, spanGaps: true,
        },
        {
          label: 'Média do período', data: precos.map(() => media),
          borderColor: '#94a0b8', borderDash: [5,4], borderWidth: 1.5, pointRadius: 0, fill: false,
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => c.dataset.label + ': ' + fmtBRL.format(c.parsed.y) + '/L' } }
      },
      scales: {
        x: { ...eixoBase, grid: { display: false }, ticks: { ...eixoBase.ticks, maxTicksLimit: 20, maxRotation: 0 } },
        y: { ...eixoBase, ticks: { ...eixoBase.ticks, callback: v => fmtBRL.format(v) } }
      }
    }
  });
}

             ticks: { ...eixoBase.ticks, autoSkip: false,

const rotuloPontaBarraPlugin = {
  id: 'rotuloPontaBarra',
  afterDatasetsDraw(chart, args, opts) {
    if (!opts.formatter) return;
    const ctx = chart.ctx;
    const meta = chart.getDatasetMeta(0);
    ctx.save();
    ctx.font = '600 11px -apple-system, "Segoe UI", sans-serif';
    ctx.fillStyle = '#52514e';
    ctx.textBaseline = 'middle';
    meta.data.forEach((barra, i) => {
      ctx.fillText(opts.formatter(chart.data.datasets[0].data[i]), barra.x + 6, barra.y);
    });
    ctx.restore();
  }
};

function desenharDistribuicaoSemanal() {
  const todasAreas = DADOS.porAreaNegocio;
  const labels = DADOS.semanas.map(s => s.label);
  const n = labels.length;
  const cores = [getCss('--serie-1'), getCss('--serie-3'), getCss('--serie-4'), getCss('--serie-2'), getCss('--serie-5')];

  const top5 = todasAreas.slice(0, 5);
  const resto = todasAreas.slice(5);

  const series = top5.map((a, i) => ({ nome: a.nome, cor: cores[i], litros: a.porSemana }));
  if (resto.length) {
    const litrosOutras = Array(n).fill(0);
    resto.forEach(a => a.porSemana.forEach((v, i) => litrosOutras[i] += v));
    series.push({ nome: 'Outras', cor: getCss('--serie-outros'), litros: litrosOutras });
  }

  // Participação (%) de cada área dentro do total DAQUELA semana (todas as áreas).
  const totalPorSemana = Array(n).fill(0);
  todasAreas.forEach(a => a.porSemana.forEach((v, i) => totalPorSemana[i] += v));

  novoChart('chDistribSemanal', {
    type: 'bar',
    data: {
      labels,
      datasets: series.map(s => ({
        label: s.nome,
        data: s.litros.map((v, i) => totalPorSemana[i] > 0 ? arred2(v / totalPorSemana[i] * 100) : 0),
        backgroundColor: s.cor,
        maxBarThickness: 22,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 }, color: '#52514e' } },
        tooltip: { callbacks: { label: c => c.dataset.label + ': ' + fmtPct(c.parsed.y) } }
      },
      scales: {
        x: { ...eixoBase, stacked: true, grid: { display: false }, ticks: { ...eixoBase.ticks, maxTicksLimit: 20, maxRotation: 0 } },
        y: { ...eixoBase, stacked: true, max: 100, ticks: { ...eixoBase.ticks, callback: v => v + '%' } }
      }
    }
  });
}

function arred2(v) { return Math.round(v * 100) / 100; }

// ── 4. Classe Operativa (matriz) ─────────────────────────────────────────

function secaoClasseOperativa(j) {
  const co = j.porClasseOperativa;
  const semanas = j.semanas;
  const theadCols = semanas.map(s => `<th>${s.label}</th>`).join('');

  const linhas = co.linhas.map(l => {
    const maxLinha = Math.max(...l.porSemana, 1);
    const cols = l.porSemana.map(v => {
      const intensidade = v / maxLinha;
      const bg = v === 0 ? 'transparent' : `rgba(42,120,214,${0.12 + intensidade*0.55})`;
      const cor = intensidade > 0.6 ? '#fff' : 'var(--ink)';
      return `<td style="background:${bg};color:${cor}">${v ? fmtInt.format(v) : '-'}</td>`;
    }).join('');
    return `<tr><td>${escapeHtml(l.nome)}</td>${cols}<td class="num" style="font-weight:700">${fmtInt.format(l.total)}</td></tr>`;
  }).join('');

  const totalCols = co.totalPorSemana.map(v => `<td>${fmtInt.format(v)}</td>`).join('');

  return `
  <div class="secao">
    <div class="secao-header"><span class="secao-num">4</span><span class="secao-titulo">Consumo Semanal por Classe Operativa</span></div>
    <div class="secao-sub">Volume em litros (L) · linhas = classe operativa · colunas = semana operacional · intensidade da cor = peso na linha</div>

    <div class="matriz-scroll">
      <table class="matriz">
        <thead><tr><th>Classe Operativa</th>${theadCols}<th>Total</th></tr></thead>
        <tbody>
          ${linhas}
          <tr class="total"><td>Total Geral</td>${totalCols}<td>${fmtInt.format(co.totalGeral)}</td></tr>
        </tbody>
      </table>
    </div>
    ${co.linhas.some(l => l.nome === 'Não Classificado' || l.nome === 'Não Classificado Terceiro')
      ? '<div class="insight-box"><span class="insight-icone">!</span><div>Há modelos de equipamento sem Classe Operativa cadastrada — complete o de-para em <b>Administração → De-Para Classe Operativa</b> para refinar esta visão.</div></div>'
      : ''}
  </div>`;
}

// ── Chart helper ──────────────────────────────────────────────────────────

function novoChart(id, config) {
  if (charts[id]) charts[id].destroy();
  const canvas = document.getElementById(id);
  if (!canvas) return;
  charts[id] = new Chart(canvas, config);
}

    'Data': d.data ? String(d.data).substring(0,10) : '', 'Hora': d.hora_ini || '',
    'Equipamento': d.des_equipamento || d.prefixo || '', 'Combustível': d.des_combustivel || '',
    'Litros': d.qtde_litros || 0, 'R$/Litro': d.valor_unitario || 0, 'Valor Total': d.valor_total || 0,
    'Fazenda': d.des_fazenda || '', 'Tipo Cliente': d.tipocliente || '', 'Área de Negócio': d.desc_negocio || '',
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detalhe), 'Detalhamento');

  const ini = document.getElementById('dataIni').value, fim = document.getElementById('dataFim').value;
  XLSX.writeFile(wb, `relatorio_combustivel_${ini}_a_${fim}.xlsx`);
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

carregar();
</script>
