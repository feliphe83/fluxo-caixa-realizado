<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Conta · Intranet USC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f4f6fb;
    color: #1a1a2e;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #0f2460 0%, #1a3a7c 100%);
    color: white;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo { width: 38px; height: 38px; border-radius: 8px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; }
  .header-title { font-size: 16px; font-weight: 700; }
  .header-sub { font-size: 11px; opacity: .75; margin-top: 2px; }
  .btn-voltar {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 16px; border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9);
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .btn-voltar:hover { background: rgba(255,255,255,0.18); }

  .conteudo { max-width: 480px; margin: 0 auto; padding: 60px 24px; }

  .card {
    background: white; border: 1.5px solid #e3e8f5; border-radius: 16px;
    padding: 32px;
  }
  .card-icone {
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg, #1a3a7c, #0f2460);
    color: white; display: flex; align-items: center; justify-content: center;
    margin-bottom: 18px;
  }
  .card-titulo { font-size: 19px; font-weight: 800; color: #0f2460; margin-bottom: 6px; }
  .card-sub { font-size: 13px; color: #64748b; margin-bottom: 26px; }

  .info-usuario {
    background: #f8faff; border: 1px solid #e3e8f5; border-radius: 10px;
    padding: 14px 16px; margin-bottom: 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .info-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: #1a3a7c; color: white; font-weight: 700;
    display: flex; align-items: center; justify-content: center; font-size: 15px;
  }
  .info-nome { font-size: 14px; font-weight: 700; color: #1a1a2e; }
  .info-logon { font-size: 12px; color: #94a0b8; }

  .campo { margin-bottom: 18px; }
  .campo label { display: block; font-size: 12px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 7px; }
  .campo input {
    width: 100%; padding: 11px 14px; border: 1.5px solid #d8dfee; border-radius: 9px;
    font-size: 14px; color: #1a1a2e; outline: none;
  }
  .campo input:focus { border-color: #1a3a7c; }
  .campo .hint { font-size: 11.5px; color: #94a0b8; margin-top: 6px; }
  .campo .erro-msg { font-size: 11.5px; color: #ef4444; margin-top: 6px; display: none; }

  .btn-salvar {
    width: 100%; padding: 13px; border-radius: 10px; border: none;
    background: #1a3a7c; color: white; font-size: 14.5px; font-weight: 700;
    cursor: pointer; margin-top: 8px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-salvar:hover { background: #0f2460; }
  .btn-salvar:disabled { background: #9ca3af; cursor: not-allowed; }

  .toast {
    position: fixed; top: 24px; right: 24px; z-index: 999;
    padding: 14px 20px; border-radius: 10px; font-size: 13.5px; font-weight: 600;
    color: white; box-shadow: 0 8px 24px rgba(0,0,0,.18);
    display: none; align-items: center; gap: 8px;
  }
  .toast.show { display: flex; }
  .toast.green { background: #16a34a; }
  .toast.red { background: #ef4444; }
</style>
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="img/apple-touch-icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="img/apple-touch-icon-167.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="USC">
  <meta name="theme-color" content="#0f2460">
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">USC</div>
    <div>
      <div class="header-title">Minha Conta</div>
      <div class="header-sub">Alterar sua senha de acesso</div>
    </div>
  </div>
  <button class="btn-voltar" onclick="window.location.href='hub.html'">
    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Voltar ao Hub
  </button>
</div>

<div class="conteudo">
  <div class="card">
    <div class="card-icone">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
    </div>
    <div class="card-titulo">Alterar Senha</div>
    <div class="card-sub">Defina uma nova senha para acessar a Intranet USC.</div>

    <div class="info-usuario">
      <div class="info-avatar" id="infoAvatar">?</div>
      <div>
        <div class="info-nome" id="infoNome">—</div>
        <div class="info-logon" id="infoLogon">—</div>
      </div>
    </div>

    <div class="campo">
      <label>Nova Senha</label>
      <input type="password" id="novaSenha" placeholder="Mínimo 6 caracteres" oninput="validar()">
      <div class="hint">Use ao menos 6 caracteres.</div>
    </div>

    <div class="campo">
      <label>Confirmar Nova Senha</label>
      <input type="password" id="confirmaSenha" placeholder="Repita a nova senha" oninput="validar()">
      <div class="erro-msg" id="erroConfirma">As senhas não coincidem.</div>
    </div>

    <button class="btn-salvar" id="btnSalvar" onclick="salvarSenha()" disabled>
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
      Salvar Nova Senha
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
fetch('api/sessao').then(r => r.json()).then(j => {
  if (!j || !j.logon) { window.location.href = 'login.html'; return; }
  const nome = j.nome || j.logon;
  document.getElementById('infoNome').textContent = nome;
  document.getElementById('infoLogon').textContent = j.logon;
  document.getElementById('infoAvatar').textContent = nome.charAt(0).toUpperCase();
});

function validar() {
  const nova = document.getElementById('novaSenha').value;
  const confirma = document.getElementById('confirmaSenha').value;
  const erro = document.getElementById('erroConfirma');
  const btn = document.getElementById('btnSalvar');

  const coincide = nova === confirma;
  const tamanhoOk = nova.length >= 6;

  erro.style.display = (confirma.length > 0 && !coincide) ? 'block' : 'none';
  btn.disabled = !(tamanhoOk && coincide && confirma.length > 0);
}

async function salvarSenha() {
  const novaSenha = document.getElementById('novaSenha').value;
  const btn = document.getElementById('btnSalvar');

  btn.disabled = true;
  btn.textContent = 'Salvando…';

  try {
    const r = await fetch('api/minha-conta/senha', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ novaSenha })
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.erro);

    mostrarToast('Senha alterada com sucesso!', 'green');
    document.getElementById('novaSenha').value = '';
    document.getElementById('confirmaSenha').value = '';

  } catch(e) {
    mostrarToast('Erro: ' + e.message, 'red');
  } finally {
    btn.innerHTML = `<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> Salvar Nova Senha`;
    validar();
  }
}

let toastTimer = null;
function mostrarToast(msg, cor) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + cor;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}
</script>

<script src="js/agro-chat-widget.js" defer></script>
</body>
</html>
