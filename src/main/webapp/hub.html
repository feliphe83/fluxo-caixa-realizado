<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intranet USC · Central de Módulos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f4f6fb;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f2460 0%, #1a3a7c 100%);
    color: white;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-logo { width: 42px; height: 42px; border-radius: 8px; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 5px; flex-shrink: 0; }
  .header-logo img { width: 100%; height: 100%; object-fit: contain; }
  .header-title { font-size: 18px; font-weight: 700; }
  .header-sub { font-size: 12px; opacity: .75; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 16px; margin-right: 56px; }
  .header-user { font-size: 13px; opacity: .9; text-align: right; }
  .btn-sair {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 16px; border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85);
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all .18s;
  }
  .btn-sair:hover { background: rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.6); color: white; }

  /* Conteúdo */
  .conteudo { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
  .titulo-principal { font-size: 24px; font-weight: 800; color: #0f2460; margin-bottom: 6px; }
  .subtitulo-principal { font-size: 14px; color: #64748b; margin-bottom: 32px; }

  /* Categorias */
  .categoria-bloco { margin-bottom: 36px; }
  .categoria-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px;
  }
  .categoria-icone {
    width: 34px; height: 34px; border-radius: 9px;
    background: #e8edfb; color: #1a3a7c;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .categoria-nome { font-size: 16px; font-weight: 700; color: #0f2460; }

  .modulos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }

  .modulo-card {
    background: white;
    border: 1.5px solid #e3e8f5;
    border-radius: 14px;
    padding: 22px;
    cursor: pointer;
    transition: all .18s;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .modulo-card:hover {
    border-color: #1a3a7c;
    box-shadow: 0 8px 24px rgba(26,58,124,0.12);
    transform: translateY(-2px);
  }
  .modulo-icone {
    width: 44px; height: 44px; border-radius: 11px;
    background: linear-gradient(135deg, #1a3a7c, #0f2460);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .modulo-nome { font-size: 15px; font-weight: 700; color: #1a1a2e; }
  .modulo-desc { font-size: 12.5px; color: #6b7488; line-height: 1.4; }

  /* Estado vazio */
  .estado-vazio {
    text-align: center;
    padding: 80px 20px;
    color: #94a0b8;
  }
  .estado-vazio svg { width: 56px; height: 56px; margin-bottom: 16px; opacity: .5; }
  .estado-vazio p { font-size: 14px; }

  /* Loading */
  .loading-state { text-align: center; padding: 80px 20px; color: #94a0b8; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid #e3e8f5; border-top-color: #1a3a7c;
    border-radius: 50%; margin: 0 auto 12px; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="img/apple-touch-icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="img/apple-touch-icon-167.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="USC">
  <meta name="theme-color" content="#0f2460">
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo"><img src="img/logo.png" alt="USC"></div>
    <div>
      <div class="header-title">Usina Santa Clotilde S/A</div>
      <div class="header-sub">Intranet · Central de Módulos</div>
    </div>
  </div>
  <div class="header-right">
    <div class="header-user" id="hdr-usuario" onclick="window.location.href='minha-conta.html'" style="cursor:pointer;text-decoration:underline;text-decoration-color:transparent;transition:text-decoration-color .15s" onmouseover="this.style.textDecorationColor='currentColor'" onmouseout="this.style.textDecorationColor='transparent'" title="Alterar minha senha"></div>
    <button class="btn-sair" onclick="sair()">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
      </svg>
      Sair
    </button>
  </div>
</div>

<div class="conteudo">
  <div class="titulo-principal">Bem-vindo</div>
  <div class="subtitulo-principal">Selecione um módulo para começar</div>
  <div id="hub-container">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Carregando módulos disponíveis…</p>
    </div>
  </div>
</div>

<script>
fetch('api/sessao').then(r => r.json()).then(j => {
  if (!j || !j.logon) { window.location.href = 'login.html'; return; }
  document.getElementById('hdr-usuario').textContent = j.nome || j.logon;
});

function sair() {
  fetch('api/login').finally(() => { window.location.href = 'login.html'; });
}

// Mapa simples de ícones (nome -> SVG). Adicione mais conforme necessário.
const ICONES = {
  'dollar-sign': '<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',
  'package':     '<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>',
  'trending-up': '<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
  'users':       '<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>',
};

function iconeHtml(nome) {
  return ICONES[nome] || ICONES['package'];
}

fetch('api/hub').then(r => r.json()).then(j => {
  const container = document.getElementById('hub-container');

  if (!j.ok) {
    container.innerHTML = '<div class="estado-vazio"><p>Erro ao carregar módulos: ' + (j.erro || '') + '</p></div>';
    return;
  }

  if (!j.categorias || j.categorias.length === 0) {
    container.innerHTML = `
      <div class="estado-vazio">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <p>Você ainda não tem acesso a nenhum módulo.<br>Solicite ao administrador a liberação do acesso.</p>
      </div>`;
    return;
  }

  container.innerHTML = j.categorias.map(cat => `
    <div class="categoria-bloco">
      <div class="categoria-header">
        <div class="categoria-icone">${iconeHtml(cat.icone)}</div>
        <div class="categoria-nome">${escapeHtml(cat.nome)}</div>
      </div>
      <div class="modulos-grid">
        ${cat.modulos.map(mod => `
          <div class="modulo-card" onclick="abrirModulo('${escapeAttr(mod.urlDestino)}')">
            <div class="modulo-icone">${iconeHtml(mod.icone)}</div>
            <div class="modulo-nome">${escapeHtml(mod.nome)}</div>
            ${mod.descricao ? `<div class="modulo-desc">${escapeHtml(mod.descricao)}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
});

function abrirModulo(url) {
  window.location.href = url;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(s) {
  if (s == null) return '';
  return String(s).replace(/'/g, "\\'");
}
</script>

<script src="js/sidebar-nav.js" defer></script>
<script src="js/agro-chat-widget.js" defer></script>
</body>
</html>
