<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordem de Compra — USC</title>
<style>
  :root {
    --verde-escuro: #0f2460;
    --creme: #F5F0E8;
    --text: #1f2937;
    --border: #d1d5db;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; height: 100dvh; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif; background: var(--creme); color: var(--text);
    display: flex; flex-direction: column;
  }

  .header {
    background: var(--verde-escuro); color: white;
    padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .logo-box {
    width: 36px; height: 36px; background: white; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    overflow: hidden; padding: 4px;
  }
  .logo-box img { width: 100%; height: 100%; object-fit: contain; }
  .header-title { font-size: 15px; font-weight: 700; flex: 1; min-width: 0; }

  .btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1); color: white;
    font-size: 13px; font-weight: 600; cursor: pointer;
    text-decoration: none; white-space: nowrap; transition: background .15s;
  }
  .btn:hover { background: rgba(255,255,255,0.22); }
  .btn.whatsapp { background: #25d366; border-color: #25d366; }
  .btn.whatsapp:hover { background: #1ebe5b; }

  .visualizador { flex: 1; min-height: 0; }
  .visualizador iframe { width: 100%; height: 100%; border: none; background: #525659; }

  .aviso {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 10px; padding: 40px 20px; text-align: center; color: var(--text);
  }
  .aviso svg { color: #ef4444; }

  .rodape-fallback {
    padding: 8px 16px; background: white; border-top: 1px solid var(--border);
    font-size: 12px; color: #6b7280; text-align: center; flex-shrink: 0;
  }
  .rodape-fallback a { color: var(--verde-escuro); font-weight: 600; text-decoration: none; }

  @media (max-width: 560px) {
    .header { flex-wrap: wrap; }
    .header-title { order: -1; width: 100%; }
    .btn span.txt-longo { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-box"><img src="img/logo.png" alt="USC"></div>
  <div class="header-title">Ordem de Compra</div>
  <button class="btn" onclick="voltar()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    <span class="txt-longo">Voltar</span>
  </button>
  <button class="btn whatsapp" onclick="compartilhar()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12.004 2C6.477 2 2 6.478 2 12.005c0 1.988.55 3.845 1.505 5.428L2 22l4.706-1.478A9.958 9.958 0 0012.004 22C17.53 22 22 17.522 22 11.994 22 6.467 17.53 2 12.004 2zm0 18.062a8.03 8.03 0 01-4.383-1.29l-.314-.19-3.104.976.99-3.09-.204-.32a8.02 8.02 0 01-1.227-4.243c0-4.42 3.596-8.017 8.024-8.017 4.428 0 8.024 3.596 8.024 8.017.001 4.42-3.594 8.157-8.006 8.157z"/></svg>
    Compartilhar
  </button>
</div>

<div id="conteudo" class="visualizador"></div>
<div class="rodape-fallback">
  Se o PDF não abrir aqui, <a id="linkDireto" href="#" target="_blank" rel="noopener">clique aqui para abrir/baixar diretamente</a>.
</div>

<script>
const params = new URLSearchParams(location.search);
const token = params.get('token');
const urlPdf = 'api/publico/ordem-compra-pdf?token=' + encodeURIComponent(token || '');

if (!token) {
  document.getElementById('conteudo').outerHTML = `
    <div class="aviso">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div><b>Link inválido.</b><br>Peça ao Dr. Alfredo pra consultar a ordem de compra novamente.</div>
    </div>`;
  document.querySelector('.rodape-fallback').style.display = 'none';
} else {
  document.getElementById('conteudo').innerHTML = `<iframe src="${urlPdf}" title="PDF da Ordem de Compra"></iframe>`;
  document.getElementById('linkDireto').href = urlPdf;
}

function voltar() {
  window.location.href = 'agro-chat.html';
}

function compartilhar() {
  const urlCompleta = new URL(urlPdf, window.location.href).href;
  const mensagem = 'Ordem de Compra — Usina Santa Clotilde: ' + urlCompleta;

  if (navigator.share) {
    navigator.share({ title: 'Ordem de Compra', text: mensagem, url: urlCompleta }).catch(() => {});
  } else {
    window.open('https://wa.me/?text=' + encodeURIComponent(mensagem), '_blank');
  }
}
</script>

</body>
</html>
